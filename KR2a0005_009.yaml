body:
  text: 讀史記十表卷九南陽汪越撰建元以來王子侯者年表第九制詔御史諸侯王或欲推私恩分子弟邑者令各條上朕且臨定其號名太史公曰盛哉天子之德一人有慶天下賴之國名王子號元光元朔元狩元鼎元封太初讀史記十表卷九讀建元以來王子侯者年表讀王子侯者表亦以天子為主時主父偃説上曰古者諸侯不過百里強弱之形易制今或連城數十地方千里緩則驕奢易為淫亂急則阻其疆而合從以逆京師若以法制削之則逆節萌起今諸侯子弟或十數而適嗣代立餘無尺寸地封願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國不削而自弱矣上從之故太史公曰盛哉天子之德一人有慶天下賴之陳仁子云遷之言似頌似諷秦制有徹侯漢避武帝名諱徹為通有關內侯無食邑以賞功勞漢約非軍功不侯武帝始侯諸王子有食邑但即其父所封國使支庶侯者分食之此所謂衆建而少其力實賈誼遺䇿也表國名今所受侯食邑也次表王子號從其父明宗室親屬也次表姓名王朝年月侯者元年或不具年月者闕文也漢書侯所食邑多書其郡縣于下史記不書而索隱具載之劉氏曰諸侯封名史漢表各有不同不敢輒改但略檢表志同異以備多識也黃履翁曰史記王子侯者表斷自建元蓋是時始行分封之典遷意正自有在也固則起于高祖自謂聖祖建業以廣親親殊失王子侯表之本旨矣按史記斷自建元以大封諸王支庶實始于主父偃䇿也漢書起高祖訖孝平離為上下篇備一代王子封典故也河間獻王子十一人長沙定王子十五人楚安王子二人魯共王子六人江都易王子七人災川懿王子十二人城陽共王子十三人趙敬肅王子十四人中山靖王子十九人廣川惠王子四人濟北貞王子十一人漢書載濟北貞王子六人濟北式王子五人代共王子八人齊孝王子十人衡山王賜子一人城陽頃王子十九人災川靖王子五人廣川穆王子二人膠東康王子三人有同是一王之子而前後别見者蓋異年封也諸王子之後失侯者坐酎金凡五十五無後四此外則不朝不敬一棄綬出國不敬一其甚者則篡死罪一姦人妻一姦姊妹一殺人坐棄市一殺弟坐棄市一有罪不明所坐十而謀叛者無聞焉豈非户邑分而勢銷弱故歟然漢自是遂無大藩國至于哀平之際王氏專政一嵗之中無罪而免者數十捽而去之如揮羊豕其欲誅莽者武平侯璜陵鄉侯曽翟義所立者嚴鄉侯信祗駢首就戮無一人應惡覩所謂百足不僵者乎故觀王子侯表合漢興以來諸侯表究其終始此西京二百三十年之大勢也洪邁曰漢列侯八百餘人至光武而存者平陽富平二侯耳按稱八百餘則是兼異姓也讀建元以來王子侯者年表補王子封侯在昔已然不自主父偃言始也偃之言在元朔二年元光五六年間已封河間獻王子侯一人長沙定王子四人楚安王子二人元朔元年侯魯共王子一人江都易王子五人論者謂建元始行分封之典何也蓋前此之封恩自上逮或侯或不侯不盡封也至是始令諸侯各得推私恩分子弟恩自下推上特臨定之耳所以藩國悉分支庶畢侯不削而自弱也文帝采賈誼之言武帝用主父之䇿其事一也而實不同文帝之心在分地以保全之不失親親之本故淮南厲王廢死隨立其嗣武帝之心在分地以削弱之假以推恩之名故封不數年以酎金小過除國者凡五十六人汲黯所謂內多欲而外施仁義者即此可見也惡得與文帝比哉論者輒謂封建不行則三代之治不復非也自古有治人無治法謂封建為聖王公天下之心則可謂天下之治安繫于此則不然漢事不足論觀周之天下可見矣列國分爭干戈不息無論天子僅守府生民之塗炭其何以堪如謂秦以孤立速亡夫以秦之暴即封建得無亡乎栁子厚謂秦之失在政不在制非過論也天下之治亂安危繫于君德封建何與焉存疑元鼎元年四月戊寅封城陽頃王子十九人按漢表二十人內有挍侯雲挾釐侯霸史表載挍侯霸名邑參錯故失其一當從漢書為是漢表别載不得封年十人史表無之又征和元年封四人二年封一人此在史表後也
