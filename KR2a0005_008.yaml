body:
  text: 讀史記十表卷八南陽汪越撰建元以來侯者年表第八索隱曰七十二國太史公舊餘四十五國褚先生補也太史公曰胸奴絶和親攻當路塞閩越擅伐東甌請降二夷交侵當盛漢之隆以此知功臣受封侔于祖考矣何者自詩書稱三代戎狄是膺荆荼是徴索隱曰荼音舒徵音澄齊桓越燕伐山戎武靈王以區區趙服單于秦繆用百里霸西戎吳楚之君以諸侯役百越况乃以中國一統明天子在上兼文武席卷四海內輯億萬之衆豈以晏然不為邊境征伐哉自是後遂出師北討強胡南誅徑越將卒以次封矣國名侯功元光元朔元狩元鼎元封太初以後右太史公本表七十三當塗索隱曰表在九江魏不害以圉守尉捕淮陽反者公孫勇等侯蒲索隱曰表在琅邪蘇昌以圉尉史捕淮陽反者公孫勇等侯潦陽索隱曰潦音遼表在清河江德以圉廄嗇夫共捕淮陽反者公孫勇等侯富民索隱曰表在蘄田千秋家在長陵以故高廟寢郎上書諫孝武曰子弄父兵罪當笞父子之怒自古有之蚩尤畔父黃帝涉江上書至意拜為大鴻臚征和四年為丞相封三千戶至昭帝時病死子順代立為虎牙將軍擊胸奴不至質誅死國除漢書音義曰質所期處也右孝武封國名四後進好事儒者禇先生曰太史公記事盡于孝武之事故復修記孝昭以來功臣侯者編于左方令後好者者得覽觀成敗長短絶世之適得以自戒焉當世之君子行權合變度時施宜希世用事以建功有土封侯立名當世豈不盛哉觀其持滿守成之道皆不謙讓驕蹇爭權喜揚聲譽知進不知退終以殺身滅國以三得之以三得之者即上所謂行權合變度時施宜希世用事也及身失之不能傳功于後世令恩德流子孫豈不悲哉夫龍額侯曾為前將軍世俗順善厚重謹信不與政事退讓愛人其先起于晉六卿之世有土君國以來為王侯子孫相承不絶歷年經世以至于今凡八百餘歲豈可與功臣及身失之者同日而語之哉悲夫後世其誡之孚逺曰龍額侯已具前表此復推美以其貴盛傳後故也博陸霍光家在平陽以兄驃騎將軍故貴前事武帝覺捕得侍中謀反者馬何羅等功侯三千戶文穎曰博廣陸平取其嘉名無此縣也食邑北海河東瓉曰漁陽有博陸城也中輔幼主昭帝為大將軍謹信用事擅治尊為大司馬益封邑萬戶後事宣帝歷事三主天下信鄊之益封二萬戶子禹伐立謀反族滅國除秺漢書音義曰音妬在濟隂成武今有亭金翁叔名日磾以胸奴休屠王太子從渾邪王將衆五萬降漢孚逺曰休屠王畔約不降故日磾沒為官奴表不詳其事諱之也歸義侍中事武帝覺捕侍中謀反者馬羅何等功侯三千戶中事昭帝謹厚益封三千戶子𢎞代立為奉車都尉事宣帝安陽索隱曰表在蕩隂志屬汝南上官桀家在隴西以善騎射從軍稍貴事武帝為左將軍覺捕斬侍中謀反者馬何羅弟重合侯通功侯三千户中事昭帝與大將軍霍光爭權因以謀反族滅國除桑樂索隱曰表在千乘上官安以父桀為將軍故貴侍中事昭帝安女為昭帝夫人立為皇后故侯三千戶驕蹇與大將軍霍光爭權因以父子謀反族滅國除富平索隱曰志屬平原張安世家在杜陵以故御史大夫張湯子武帝時給事尚書為尚書令事昭帝謹厚習事為光祿勳右將軍輔政十三年無適過侯三千戶及事宣帝代霍光為大司馬用事益封萬六千戶子延壽代立為太僕侍中義陽索隱曰表在平氏傅介子家在北地以從軍為郎為平樂監昭帝時刺殺外國王天子下詔書曰平樂監傅介子使外國殺樓蘭王以直報怨不煩師有功其以邑千三百戶封介子為義陽侯子厲代立爭財相告有罪國除商利索隱曰表在徐郡王山齊人也故為丞相史會騎將軍上官安謀反山説安與俱入丞相史會山以軍功為侯三千戶上書願治民為代太守為人所上書言繫獄當死會赦出為庶人國除建平索隱曰表在濟陽杜延年以故御史大夫杜周子給事大將軍幕府發覺謀反者騎將軍上官安等罪封為侯邑二千七百戶拜為太僕元年出為西河太守五鳯三年入為御史大夫弋陽索隱曰志屬汝南任宫以故上林尉捕格謀反者左將軍上官桀殺之便門封為侯二千戶後為太常及行衛尉事節儉謹信以壽終傳于子孫宣城索隱曰表在濟隂燕倉以故大將軍幕府軍吏發謀反者騎將軍上官安有罪功封侯邑二千戶為汝南太守有能名宜春索隱曰志屬汝南王欣家在齊本小吏佐史稍遷至右輔都尉武帝數幸扶風郡欣共置辦拜為右扶風至孝昭時代桑𢎞羊為御史大夫元鳯三年代田千秋為丞相封二千戶立二年為人所上書言暴自殺不殊子代立為屬國都尉安平索隱曰表在汝南志屬涿郡楊敞家在華隂故給事大將軍幕府稍遷至大司農為御史大夫元鳯六年代王欣為丞相封二千戶立二年病死子翁君代立為典屬國三嵗以季父惲故出惡言繫獄當死得免為庶人國除右孝昭時所封國名十二陽平索隱曰志屬東郡蔡義家在溫故師受韓詩為博士給事大將軍幕府為杜城門候入侍中授昭帝韓詩為御史大夫是時年八十衰老常兩人扶持乃能行然公卿大臣議以為為人主師當以為相以元平元年九月代楊敞為丞相封二千戶病死絶無後國除扶陽索隱曰志屬沛郡表在蕭韋賢家在魯通詩禮尚書為博士授魯大儒入侍中為昭帝師遷為光祿大夫大鴻臚長信少府以為人主師本始三年代蔡義為丞相封扶陽侯千八百戶為丞相五嵗多恩不習吏事免相就第病死子玄成代立為太常坐祠廟騎奪爵為關內侯平陵索隱曰表在武當范明友家在隴西以家世習外國事使護西羌事昭帝拜為度遼將軍擊烏桓功侯二千戶取霍光女為妻地節四年與諸霍子禹等謀反族滅國除按班表入孝昭據綱目兩擊鳥桓皆昭帝時事宜從班表營平索隱曰表在濟南趙充國以隴西騎士從軍得官侍中事武帝數將兵擊胸奴有功為護軍都尉中事昭帝昭帝崩議立宣帝決疑定策以安宗廟功侯封二千五百戶陽城索隱曰表在濟隂非也且濟隂有城陽縣耳而潁川汝南又各有陽城縣城字從土在陽之下今此似誤不可分别也田延年以軍吏事昭帝發覺上官桀謀反事後留遲不得封為大司農本造廢昌邑王議立宣帝決疑定䇿以安宗廟功侯二千七百戶逢昭帝崩方上事並急因以盜都內錢三千萬漢書百官表曰司農屬官有都內發覺自殺國除平丘索隱曰志屬陳留表在肥城王遷家在衛索隱曰一作衙地理志衙縣在馮翊為尚書郎習刀筆之文侍中事昭帝帝崩立宣帝決疑定策以安宗廟功侯二千戶為光祿大夫秩中二千石坐受諸侯王金錢財漏泄中事誅死國除樂成索隱曰表在平氏志屬南陽霍山山者大將軍光兄孫也光未死時上書曰臣兄驃騎將軍去病從軍有功病死賜諡景桓侯絶無後臣光願以所封東武陽邑三千五百戶分與山天子許之拜山為侯後坐謀反族滅國除冠軍索隱曰志屬南陽霍雲以大將軍兄驃騎將軍適孫為侯地節三年天子下詔書曰驃騎將軍適孫為胸奴有功封為冠軍侯薨卒子侯代立病死無後春秋之義善善及子孫其以邑三千戶封雲為冠軍侯後坐謀反族滅國除平恩索隱曰志屬魏郡許廣漢家昌邑坐事下蠶室獨有一女嫁之宣帝未立時素與廣漢出入相通卜相者言當大貴以故廣漢施恩甚厚地節三年封為侯邑三千戶病死無後國除昌水索隱曰表在於陵田廣明故郎為司馬稍遷至南郡都尉淮陽太守鴻臚左馮翊昭帝崩議廢昌邑王立宣帝決疑定策以安宗廟本始三年封為侯邑二千三百戶為御史大夫後為祁連將軍擊胸奴軍不至質當死自殺國除高平索隱曰志屬臨淮魏相家在濟隂少學易為府卒史以賢良舉為茂陵令遷河南太府坐賊殺不辜繫獄當死會赦免為庶人有詔守茂陵令為揚州刺史入為諌議大夫復為河南太守遷為大司農御史大夫地節三年譛毁韋賢代為丞相封千五百戶病死長子賓代立坐祠廟失侯博望索隱曰志屬南陽許中翁名舜以平恩侯許廣漢弟封為侯邑二千戶亦故有私恩為長樂衛尉死子延年代立樂平許翁孫以平恩侯許廣漢少弟故為侯封二千戶拜為強弩將軍擊破西羌還更拜為大司馬光祿勳亦故有私恩故得封嗜酒好色以早病死子湯代立將陵史子回名曽以宣帝大毋家封為侯二千六百戶與平臺侯昆弟行也子回妻宜君故成王孫嫉妬絞殺侍婢四十餘人盜斷婦人初産子臂膝以為媚道為人所上書言論棄市子回以外家故不失侯平臺索隱曰志屬常山史子叔名玄以宣帝大母家封為侯二千五百戶衛太子時史氏內一女於太子嫁一女魯王今見魯王亦史氏外孫也外家有親以故貴數得賞賜樂陵索隱曰志屬臨淮平原亦有樂陵史子長名高以宣帝大母家貴侍中重厚忠信以發覺霍氏謀反事封三千五百戶博成索隱曰表在臨淮張章父故潁川人為長安亭長失官之北闕上書寄宿霍氏第舍卧馬櫪間夜聞養馬奴相與語言諸霍氏子孫欲謀反狀因上書告反為侯封三千戶都成索隱曰志屬潁川金安上先故胸奴以發覺故大將軍霍光子禹等謀反事有功封侯二千八百戶安上者奉車都尉秺侯從羣子行謹善退讓以自持欲傳功德于子孫平通索隱曰表在博陽楊惲家在華隂故丞相楊敞少子任為郎好士自喜知人居衆人中常與人顔色以故高昌侯董忠引與屏語言霍氏謀反狀共發覺告反侯二千戶為光祿勳到五鳯四年作為妖言大逆罪腰斬國除高昌索隱曰志屬千乘董忠父故潁川陽翟人以習書詣長安忠有材力能騎射用短兵給事期門與張章相習知章告語忠霍禹謀反狀忠以語常侍騎郎楊惲共發覺告反侯二千戶今為梟騎都尉侍中坐祠宗廟乘小車奪百户爰戚趙成索隱曰漢表作趙長平用發覺楚國事侯二千三百戶地節元年楚王與廣陵王謀反成發覺反狀天子推恩廣德義下詔書曰無治廣陵王廣陵王不變更後復坐祝詛滅國自殺國除今帝復立子為廣陵王孚逺曰廣陵王事不宜載在趙成表中此刪截未淨酇地節三年天子下詔書曰朕聞漢之興相國蕭何功第一今絶無後朕甚憐之其以邑三千戶封蕭何玄孫建世為鄼侯平昌王長君名無故家在趙國常山廣望邑人也衛太子時嫁太子家為太子男史皇孫為配生子男絶不聞殽問行且四十餘嵗至今元康元年中詔徵立以為侯封五千户宣帝舅父也樂昌索隱曰表在汝南王稚君名武家在趙國常山廣望邑人也以宣帝舅父外家封為侯邑五千户平昌侯王長君弟也卭成索隱曰表在濟隂王奉光家在房陵以女立為宣帝皇后故封千五百户言奉光初生時夜見光其上傳聞者以為當貴云後果以女故為侯安遠索隱曰表在慎鄭吉家在會稽以卒伍起從軍為郎使護將弛刑士田渠黎會胸奴單于死國亂相攻日逐王將衆來降漢先使語吉吉將吏卒數百人往迎之衆頗有欲還者因斬殺其渠率遂與俱入漢以軍功侯二千戶博陽索隱曰表在南頓邴吉家在魯本以治獄為御史屬給事大將軍幕府常施舊恩宣帝遷為御史大夫封侯二千户神爵二年代魏相為丞相立五嵗病死子翁孟代立為將軍侍中甘露元年坐祠宗廟不乘大車而騎至廟門有罪奪爵為關內侯建成索隱曰表在沛黃霸家在陽夏以役使徙雲陽以廉吏為河內守丞遷為廷尉監行丞相長史事坐見知夏侯勝非詔書大不敬罪久繫獄三嵗從勝學尚書會故以賢良舉為揚州刺史潁川太守善化男女異路耕者讓畔賜黃金百斤秩中二千石居潁川入為太子太傅遷御史大夫五鳯三年代邴吉為丞相封千八百户西平索隱曰表在臨淮于定國家在東海本以治獄給事為廷尉史稍遷御史中丞上書諌昌邑王遷為光祿大夫為廷尉乃師受春秋變道行化謹厚受人遷為御史大夫代黃霸為丞相右孝宣時所封二十九陽平索隱曰表在東郡王稚君名傑表索隱曰漢名禁家在魏郡故丞相史女為太子妃太子立為帝女為皇后故侯千二百户初元以來方盛貴用事遊宦求官于京師者多得其力未聞其有知略廣宣于國家也右孝元初元元年三月封讀史記十表卷八讀建元以來矦者年表讀建元矦者表以誅伐四夷為主表建元至太初以後矦者蓋主軍功而擊胸奴則軍功之大者或從大將軍衛青或從驃騎將軍霍去病多取封矦南越東甌朝鮮功又其次也有自胸奴降者有自南越東甌朝鮮小月氐降者可以威逺因矦之有父死事南越而其子矦者樛世樂韓千秋是也有以父擊胸奴功而其子矦者大將軍衛青之三子是也有從擊胸奴及使絶域而矦者張騫是也其不以軍功則周子南君以周後紹封公孫𢎞以丞相詔褒為矦石慶以相丞及先人萬石積德謹行矦是也最下則樂通以方術矦矣按孝武之時虛中國以事四夷好大喜功之蔽也太史公不斤開邉而引詩書稱征伐為非得已且曰功臣受封侔于祖考其亦微詞與禇孝孫曰太史公記事盡于孝武之事故復修記孝昭以來功臣矦者編於左方令後好事者得覽觀成敗長短絶世之適得以自戒焉按功臣如霍光輔昭帝後立宣帝漢室以安金日磾張安世杜延年皆忠謹有功傅介子斬樓蘭宣威異域趙充國屯金城蔡義韋賢通經術為人主師黃霸以循吏于定國為廷尉民自以不寃邴吉有德皇孫終不自言皆人所未易能哉然惟光與安世日磾廢立行權合變功莫大焉其餘亦贊決定策者也至或出於告捕發覺逆謀以致封矦上官桀霍氏顯雲山禹馬何羅楚王之屬適為用事者資也豈非時勢使然歟此外外戚恩澤矦宣帝大母家史氏宣帝后兄許氏太子妃家王氏是也惟酇矦續封以蕭何功第一而驃騎將軍霍去病續封其後庶幾賞延于世之義乎按禇先生補孝昭以來功臣矦者而諄諄于其子孫持滿守成之道可謂善矣獨舉龍額矦韓説厚重謹信果與韓嫣不同趣歟至稱其先起晉六卿至今八百餘嵗此與其論三代世表稱霍光為皇帝後者皆不經宜司馬貞詆其蕪穢正史也讀建元以來矦者年表補高帝功臣及惠景間矦者皆兼同異姓敘之獨建元以來分矦者年表王子矦表為二何也蓋是時征代四出軍功既多支庶畢矦分邑又衆故分敘之以致意也漢表衛青霍去病入外戚夫二人皆以征討大功得矦非以外戚矦也豈得與田竇同論又凡功廕紹封丞相為侯固是恩澤但與宦者張澤方術欒大等輩亦豈得竟無區别乎大抵分屬不倫不如史表合一之為當也存疑索隱曰七十二國太史公舊今據表凡七十三國褚孝孫補四國凡七十七國以軍功矦者三十三人補三人以降矦者三十一人以功廕者三人以死事廕者二人紹先代封者一人以丞相矦者二人補一人以方術矦者一人班表載八十九人內武安周陽二人史入景表仍八十七人計增十人海西矦李廣利新時矦趙第承父矦續相如開陵侯成娩秺矦商丘成重合矦莽通德矦景建題矦張富昌邘矦李壽丞父矦孫王禇少孫補孝昭時十二矦班表載功臣八人外戚恩澤七人凡十五人計增三人陽平矦蔡義平陵矦范明友成安矦郭忠蔡范禇入宣表郭忠缺按蔡義元光元年九月為丞相矦是年四月昭帝崩六月立昌邑王草七日廢七月迎宣帝即位義封于九月依褚入宣表為是范明友以昭帝元鳯四年七月封褚入宣表非也班入昭表是褚少孫補孝宣時二十九矦按班表功臣恩澤外戚共載三十二人又隨父四人共三十六人計增七人又除蔡義范明友班入昭表實增九人長羅矦常惠合陽矦梁喜歸德矦先賢撣信成矦王定義陽矦溫敦爰氏矦便樂成陽矦劉德周子南君延年陽都矦張彭祖孝孫既云修記何又缺而弗備也
