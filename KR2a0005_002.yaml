body:
  text: 讀史記十表卷二南陽汪越撰十二諸侯年表第二太史公讀春秋厯譜諜索𨼆曰案劉杳云三代系表旁行邪上並效周譜譜起周代藝文志有古帝王譜又自古為春秋學者有年厯譜諜之說故杜元凱作春秋長厯及公子譜蓋因于舊說至周厲王未嘗不廢書而歎也曰嗚呼師摯見之矣鄭𤣥曰魯太師摯識關雎之聲首理其亂也紂為象箸而箕子唏索隠曰鄒氏及劉氏箸皆音直慮反即筯也今案箕子云為象箸必為玉杯則箸者是樽也周道缺詩人本之袵席關雎作仁義陵遲鹿鳴刺焉及至厲王以惡聞其過公卿懼誅而禍作厲王遂奔于彘索隠曰彘地名在河東後為永安縣也亂自京師始而共和行政焉是後或力政强乘弱興師不請天子然挾王室之義以討伐為會盟主政由五伯諸侯恣行淫侈不軌賊臣簒子滋起矣齊晉秦楚其在成周微甚封或百里或五十里晉阻三河齊負東海楚介江淮索隠曰介音界言楚以江淮為界秦因雍州之固四國迭興更為伯主文武所褒大封皆威而服焉是以孔子明王道干七十餘君莫能用故西觀周室論史記舊聞興于魯而次春秋上記𨼆下至哀之獲麟約其辭文去其煩重索隠曰言約史記修春秋去其重複之文也以制義法王道備人事浹七十子之徒口受其𫝊指為有所刺譏褒諱挹損之文辭不可以書見也魯君子左丘明懼弟子人人異端各安其意失其真故因孔子史記叙論其語成左氏春秋鐸椒為楚威王傅為王不能盡觀春秋采取成敗卒四十章為鐸氏微索隠曰鐸椒所撰名鐸氏微者春秋有微婉之辭故也趙孝成王時其相虞卿上采春秋下觀近世亦著八篇為虞氏春秋吕不韋者本莊襄王相亦上觀尚古刪拾春秋集六國時事以為八覽六論十二紀為吕氏春秋及如荀卿孟子公孫固韓非之徒各往往捃摭春秋之文以著書不可勝紀索隠曰荀况孟軻韓非皆著書自稱子宋有公孫固無所述此固蓋齊人韓固傳詩者也漢相張蒼歴譜五徳索隠曰按張蒼著終始五徳傳也上大夫董仲舒推春秋義頗著文焉索隠曰作春秋繁露是徐孚逺曰惟董生所作推明春秋之指其餘雖沿其名自别記事不屬春秋也太史公曰儒者斷其義馳說者騁其辭不務綜其終始厯人取其年月數家索隠曰謂隂陽術數之家也隆于神運譜諜獨記世諡其辭畧欲一觀諸要難于是譜十二諸侯自共和訖孔子表見春秋國語學者所譏盛衰大指著于篇為成學治古文者要刪焉周魯齊晉秦楚宋衛陳蔡曹鄭燕吳讀史記十表卷二讀十二諸侯年表讀十二諸侯年表以周為主茅坤曰孔子作春秋而太史公得因之以表本末盛衰之迹也索隱云篇言十二實叙十三者賤夷狄不數吳又霸在後故也不數吳而叙之者闔閭霸盟上國故也蘇洵曰越不與中國㑹盟故不叙有越世家而不列于表按十二諸侯年表並與三代世表之末相接續魯始真公齊始武公晉始靖侯秦始秦仲楚始熊勇宋始釐公衛始釐侯陳始幽公蔡始武侯曹始夷伯燕始惠侯皆所謂自共和也三代世表下十二國無鄭者鄭至周宣王始封其母弟友也吳夀夢始見于周簡王元年冠周于上尊王室也書甲子于周之上紀天道也共和元年庚申以後但書六甲表元年諸侯各以次相及詳厯數也書孔子生尊聖人也書孔子去留悼道之不行也書諸侯相侵伐明王室不能討也書簒逆罪無君也災異必書敬天也書㑹盟重息民且見夷夏之勢所由分也書弑逆臣明法也諸侯之事必舉其要謂春秋國語學者所譏盛衰大指也觀世家所載之詳乃知此表斷其義不騁其詞非獨具年月世譜而已蓋自厲而宣自幽而平周轍既東以及春秋二百四十年之大勢也讀十二諸侯年表補司馬貞謂篇言十二實叙十三者賤夷狄不數吳又霸在後故竊疑楚亦夷也何以數况吳又太伯後耶至于霸在後尤非十二國非皆霸者何論先後所疑者十一國始封皆列世表之下鄭以宣王始封紀年獨吳前既不列于世表而年表初亦不載何也謂吳夀夢始見春秋廼書夫春秋始平王四十九年前所書十二國初不以見于經也吳自太伯以後歴載世家又非不可詳叙而不數莫得其義或者舊譜十二不及吳史公以吳通中國㑹盟故叙之而數仍其舊耶表于日食灾異必書謹天戒也書于魯表從魯史也外此惟三川震彗星入斗屬周梁山崩星出婺女屬晉彗星見屬齊屬秦隕石鷁飛熒惑守心屬宋于其境也盟㑹不書不勝書也有書者美惡之大者也戰伐圍取不書不勝書也有書者美惡之大者也周定王以後晉楚爭鄭屢書傷霸之衰楚之横也朝聘不書不勝書也魯公如晉如楚悉書傷不自立也于國君嗣位則必詳表以紀年不詳則失也平王室戍周城周必書尊王也滅國必書傷不祀也迎女送女娶夫人不悉書書者有為也淫者必書淫則亂也國内亂必紀本末重内治也殺逐必紀本末正始也重耳過諸國悉書有禮無禮者譏晉文之陋也秦書初立西畤祠白帝懼始僣也卿卒不書晉襄公六年書趙成子欒貞子霍伯臼季皆卒明年書公卒傷賢臣亡霸業衰也至悼而復則書其言曰吾用魏絳九合諸侯書齊景公與晏子狩入魯問禮賢晏子也故其事與言屢書書子産為卿賢子産也故其事與言屢書吳季子來魯及齊晉鄭皆書賢季子也于衛不書闕也梁山崩表云伯宗隱其人而用其言譏伯宗也卒為三郤殺故曰不祥之實蔽賢者當之也宋表書以羊羮䧟鄭鄭表書以黿故殺君見飲食細節能召禍也秦表書以盗食善馬士得破晉勸徳施也事變必書紀異也如生有髭殺人絳市復蘇手文為魯夫人鄭姞賜蘭曹夢社宫之類書伍子胥鞭平王墓譏已甚也申包胥使人謂子胥曰子之報讐其已甚乎子胥曰吾日暮途遠故倒行而逆施之或曰予復讐也公羊傳云父不受誅子復讐可也衛武公晉文侯鄭武公之賢不一書凡見于詩書者皆弗表也存疑魯世家云懿公兄括之子伯御與魯人弑懿公而自立在位十一年宣王伐魯殺伯御立孝公表不書伯御即書魯孝公何也豈弑君者不得書乎春秋書者衆矣孝公實在位二十七年表紀三十八年似非實録周襄王元年齊率戎伐晉亂至高梁還此宜入齊表或晉表不當入魯表左傳云令不及魯故不書齊表頃公十一年如晉欲王晉晉不敢受按春秋傳齊侯朝于晉將授玉杜氏註云凡諸侯相朝升堂授玉于两楹之間索隱于齊世家引張衡之言謂諸侯朝天子執玉既授而反之諸侯自相朝則不授玉齊頃公授玉是欲尊晉為王故史公採其言而書之按周禮典瑞公侯伯子男執圭璧以朝覲宗遇會同于王諸侯相見亦如之鄭司農云亦執圭璧以相見故邾隱公來朝執玉高魯定公受玉卑是諸侯相朝未嘗不授玉也安得據張衡之言遂云欲王晉耶且衡東漢人索隱亦失考周靈王十七年諸侯同圍齊齊侯敗走入臨菑晏嬰止公公弗從晉焚郭中而去齊表云晉圍臨菑晏嬰大破之疑誤晉表重耳聞管仲死去翟之齊晉文何畏管仲耶豈仲猶楚子玉輩耶不可解春秋國語晉世家俱未載此疑誤楚武王五十一年表云王伐隨夫人心動王卒軍中按左傳楚武王入告夫人鄧曼曰余心蕩夫人曰王禄盡矣盈而蕩天之道也表語疑誤宋大水表云公自罪魯使臧文仲來弔按左傳文仲來弔宋對曰孤實不敬天降之災安得即書公自罪于來弔之前耶宋世家云魯使臧文仲來弔水公自罪曰云云較明衛襄公九年表云夫人姜氏無子當有立賤妾子元為嗣句以便下書衛靈公元年疑缺蔡表東國殺平侯子而自立蔡悼侯東國元年奔楚按春秋魯昭公二十年蔡平侯卒太子朱立楚費無極取貨于東國而謂蔡人曰將立東國不從必圍蔡蔡人懼出朱而立東國經書冬蔡侯朱出奔楚是朱已成君未見殺也出奔者朱繫于東國元年下亦誤鄭表云太子忽救齊齊將妻之當有忽辭二字疑闕鄭表書渠彌殺昭公書齊殺子亹子嬰十四年亦當書甫瑕殺子嬰疑缺鄭簡公十二年表子産為卿聲公五年表子産卒按左傳子産卒于魯昭公二十年鄭定公之八年也定公十六年卒獻公立獻公十三年卒聲公立是子産惟相簡定二君並未相獻聲也後人云歴相四君襲史表世家之訛宋武公十八年書生魯桓公母鄭莊公元年書祭仲生齊僖公元年書同母弟夷仲生陳厲公二年書生敬仲完其他不書獨書此數人者疑亦舊冊所有筆削未凈耳如謂義所在春秋可勝書耶惟魯襄公二十二年書孔子生乃尊聖之辭為不同耳表中有撮叙一二語多簡而未明疑有脫誤如齊表彗星見晏子曰田氏有徳于齊可畏宋表熒惑守心子韋曰善鄭表子産曰三國不㑹之類
