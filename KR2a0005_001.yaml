body:
  text: 讀史記十表卷一南陽汪越撰三代世表第一太史公曰五帝三代之記尚矣劉氏云尚猶乆古也尚矣之文元出大戴禮彼云黄帝尚矣自殷以前諸侯不可得而譜正義曰譜布也列其事也周以來乃頗可著孔子因史文次春秋紀元年正時日月葢其詳哉至于序尚書則略無年月或頗有然多闕不可録故疑則傳疑葢其慎也余讀諜記索隠曰諜音牒牒者記系諡之書也下云稽歴譜諜謂歴代之譜諜也黄帝以來皆有年數稽其歴譜諜終始五徳之傳索隠曰謂帝王更王以金木水火土五徳傳次相承終而復始故云終始五徳之傳古文咸不同乖異夫子之弗論次其年月豈虛哉于是以五帝繫諜尚書集世紀黄帝以來訖共和為世表索隠曰按大戴禮有五帝徳及帝繋篇葢太史公取此二篇之諜及尚書集而紀黄帝以来為系表也帝泄帝不降帝扃不降弟帝厪帝孔甲不降子好鬼神淫亂不好徳二龍去帝臯帝發索𨼆曰帝臯子也系本云帝臯生發及履癸履癸一名桀帝履癸是為桀從禹至桀十七世從黄帝至桀二十世殷湯伐夏氏從黄帝至湯十七世帝外丙湯太子太丁蚤卒故立次弟外丙帝仲壬外丙弟帝太甲故太子太丁子淫伊尹放之桐宫三年悔過自責伊尹乃迎之復位帝沃丁伊尹卒帝太庚沃丁弟帝小甲太庚弟殷道衰諸侯或不至索隠曰殷本紀及系本皆云小甲太庚子帝雍已小甲弟帝太戊雍已弟以桑穀生稱中宗帝中丁俗作仲丁帝外壬中丁弟帝河亶甲外壬弟帝祖乙帝祖辛帝沃甲祖辛弟索隠曰系本作開甲帝祖丁祖辛子帝南庚沃甲子帝陽甲祖丁子帝盤庚陽甲弟徙河南帝小辛盤庚弟帝小乙小辛弟帝武丁雉升鼎耳雊得傅說稱高宗帝祖庚帝甲祖庚弟淫徐廣曰一云淫徳殷衰帝廪辛索隠曰或作馮辛系本作祖辛誤也按上祖乙巳生祖辛故知誤也帝庚丁廩辛弟殷徙河北帝武乙慢神震死帝太丁帝乙殷益衰帝辛是為紂從湯至紂二十九世從黄帝至紂四十六世周武王伐殷從黄帝至武王十九世按舊本此後載褚先生語一段援殷周以稱霍將軍又謂堯知后稷子孫之後王故益封之百里索隠云褚先生蓋腐儒也言之不經蕪穢正史又按索隠各表述贊文義亦淺故皆不録讀史記十表卷一讀三代世表讀三代世表以黄帝為主於顓頊屬俈屬堯屬舜屬於夏屬殷屬周屬皆曰黄帝生又曰起黄帝至顓頊三世起黄帝至帝俈四世起黄帝至俈子帝堯五世黄帝𤣥孫之𤣥孫虞舜明諸帝皆黄帝後也於夏殷周曰從禹至桀十七世曰從黄帝至桀二十世從湯至紂二十九世曰從黄帝至紂四十六世周武王伐殷曰從黄帝至武王十九世明三代皆黄帝後也此必古譜諜如帝繫姓本有成文而史公据之以作表也世表者但次其世不可以紀年故也序言孔子次春秋則紀元年正時日月序尚書則弗論次其年月蓋可詳者詳之不可詳者愼之故但据繫諜尚書作世表亦愼而闕疑之意也索隱曰三代皆出自五帝故序三代要自五帝而起首也表起于五帝而但曰三代世表何也正義云五帝乆古傳記少見夏殷以來乃有尚書畧有年月比于五帝事跡易明故也索隱云三代之系長遠宜以名篇似正義說是也索隱曰太史公作史記宜應上自開闢下迄當代以為一家之首尾三皇以還載籍罕備然君臣之始教化之先既論古史不合全闕近代皇甫謐作帝王代紀徐整作三五厯皆論三皇以來事併採而補之按司馬貞補三皇本紀以伏犧女媧皆蛇身人首神農人身牛首以至煉石㫁鼇之誕皆筆之又推之開闢之初天地人三皇以為圖緯所載不可全棄又推人皇以後五龍氏以下十七君又引韓詩以為自古封太山禪梁甫者萬有餘家又稱自開闢至于獲麟凡三百二十七萬六千嵗分為十紀其可信乎太史公託始黄帝而其間猶不免牴牾况欲論著開闢以降乎故曰百家言黄帝其文不雅馴薦紳先生難言之乃知其澄汰者已多矣蘇轍曰司馬遷紀五帝遺羲農而黜少昊後世皆以為非按司馬貞補伏羲女媧神農而後及黄帝蘇轍作古史去女媧進黄帝為三皇以少昊顓頊帝俈堯舜為五帝蘇勝于小司馬矣柯維騏曰五帝之名見于孔子家語及大戴禮其說有二其一孔子對季康子以伏羲配木神農配火少昊配金顓頊配水此言數聖人革命改號取法于五行之帝非五帝之定名也其一則孔子所答宰我五帝徳曰黄帝曰顓頊曰帝嚳曰堯曰舜太史公所述五帝紀是也見五帝本紀贊中厥後皇甫謐作帝王代記蘇子由作古史鄭樵作通志並祖孔安國以伏羲神農黄帝為三皇少昊顓頊帝嚳堯舜為五帝五峰雙湖胡氏又主秦博士天皇地皇人皇之議而以伏羲神農黄帝堯舜為五帝主易繋詞道原劉氏遂以為定論竊謂皆不如太史公之說為有徴也楊慎曰譙周古史以炎帝與神農各為一人羅泌路史以軒轅與黄帝非是一帝史皇與蒼頡乃一君一臣共工氏或以為帝或以為伯而不王祝融氏或以為臣或以為火徳之主古云三皇之事若存若亡五帝之事若夢若覺蓋洪荒之世存而不論可也索隱曰漢書顓頊五世而生鯀此及帝系皆云顓頊生鯀是古史闕其代系也歐陽修曰遷所作本紀出于大戴禮世本諸書今依其說圖而考之堯舜夏商周皆出黄帝堯之崩也下傳其四世孫舜舜之崩也復上傳其四世祖禹皆夀百嵗稷契于高辛為子乃同父異母之兄弟而以世次而下之湯與王季同世湯下傳十六世為紂王季下傳一世為文王二世為武王豈不謬哉按索隱五帝譜系圖契十四世至湯稷二十餘世至文王蓋得其實矣又按表舜禹之世次亦有可疑者黄帝生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生句望句望生蟜牛蟜牛生瞽瞍瞽瞍生帝舜世數何多黄帝生昌意昌意生顓頊顓頊生鯀鯀生文命是為禹世數何少宜歐陽子深非之也惟堯之世次與禹合蓋皆四世而舜更中歴四世始與堯同時必有牴牾然此亦何足為太史公病哉唐應徳言秦興滅學而宗譜不立及漢司馬遷修史記上述黄帝下迄麟止據世本世系而作帝紀採周譜國語而作世家由是人乃知姓氏之所出然則掇拾于煨燼之餘亦未可訾其鄙陋而不學疎畧而輕信也自成王誦至厲王胡帝王世也至共和而訖下列諸侯凡十一國初封而後各有世數亦至共和而訖然不冠于十二諸侯年表之前而綴于三代世表之末何也明諸侯亦皆黄帝後也魯衛燕晉曹蔡周之同姓宋殷後陳舜後齊為四岳伯夷之裔秦之先帝顓頊之苗裔楚之祖亦出顓頊本紀云黄帝二十五子其得姓者十四人是以附見三代世表也讀三代世表補世表惟名三代不言五帝者索隱謂三代之系長正義謂五帝傳訖少見皆非也夏為顓頊後商周為帝俈後同出黄帝則黄帝顓頊帝俈即表于三代堯授舜舜授禹無帝系可表故不得兼言五帝世表也夏商表至桀紂訖周表不訖赧王訖于共和者太史公云周自厲王始亂共和行政此後以彊乗弱興師不請天子則是時天下大勢在諸侯不在王室宣王中興之業雖見于詩車攻吉日諸章據小序祈父白駒黄鳥行野諸篇則皆為刺宣王之詩而國語所戴不藉千畆敗績姜戎建少奪長諸侯不睦料民太原卒及幽王乃廢滅則時事亦可知矣年表雖冠周于上實以諸侯為主故不復曰周世表但曰十二諸侯年表六國年表而已夏表書帝啓作甘誓見世變也征苗之誓惟曰一乃心力其克有勲甘誓則曰不用命孥戮汝故君子謂讀甘誓知唐虞之風微商周之運至矣羿浞簒立不書削也索隠曰帝相既逐中間歴羿浞二氏凡三四十年而史表不載本紀直云帝相崩子少康立疎畧之甚按史之所以不載者初帝相尚在灌鄩繼則少康生于有仍故直削之但夏本紀亦當叙其事不應全闕徐孚遠云史遷時左傳未顯不知羿浞事此或然也商表書伊尹卒書得傅說特筆也表于五帝三王不繋一事獨文王書益易卦特筆也存疑周懿王表云周道衰詩人作刺周本紀同十二諸侯年表序亦云周道闕仁義陵遲鹿鳴刺焉按詩小序王風皆東遷後刺平王及桓王莊王之詩益未云刺懿王即鹿鳴小序亦謂燕羣臣嘉賔之詩非刺也未審何據當日詩不一家或别有本耶宋表湣公丁公弟按宋世家湣公丁公子家語本姓解云云丁公申生湣公共弟字疑誤衛表孝公一本作孝伯按衛世家康伯卒子考伯立古史考亦云考伯孝字疑誤
