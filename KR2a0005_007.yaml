body:
  text: 讀史記十表卷七南陽汪越撰惠景間侯者年表第七太史公讀列封至便侯索𨼆曰便音鞭縣名吳淺所封曰有以也夫長沙王者著令甲稱其忠焉鄧展曰漢約非劉氏不王以芮忠故著令使特王昔髙祖定天下功臣非同姓疆土而王者八國索𨼆曰謂楚王韓信韓王信燕王盧綰梁王彭越趙王張耳淮南王英布臨江王共敖長沙王吳芮也其孚遠曰項羽封諸將為王漢王初興不能一申古制易侯而貶爵亦勢也故末年有白馬之誓髙祖本意見矣至孝惠時唯獨長沙全禪五世以無嗣絶徐廣曰孝文後七年婧王薨無嗣竟無過為藩守職信矣故其澤流枝庶母功而侯者數人索𨼆曰按此表芮子淺封便侯傳至𤣥孫又封成王臣之子為沆臨侯亦至曽孫及孝惠訖孝景間五十載追修髙祖時遺功臣及從代來呉楚之勞諸侯子弟若柿腑索𨼆曰柿音肺腑音附柿木札也附木皮也喻人主疎末之親如木札出于木樹皮附于樹也外國歸義封者九十有餘咸表始終當世仁義成功之著者也右孝景時三十一讀史記十表卷七讀惠景間矦者年表讀惠景間矦者年表以四朝事勢為主孝惠之時天下無事惟修遺功高后之時欲矦諸吕故先封高祖功臣及諸王子見高后本紀中孝文從代邸入為帝則有誅諸吕功有從代來功是時王子漸繁則有分封有外威恩澤孝景更有吳楚之變有匈奴之降凡此事勢各異公私亦别不得一例論之也孝惠時矦者三人高后時矦者三十一人孝文時矦者二十九人孝景時矦者三十人漢約非有功不矦此表以功得矦者有四曰修高祖時遺功臣也曰誅諸吕也曰從代來也曰吳楚之役也此外同姓若孝惠子漢書以非真孝惠子削不書齊悼惠王子淮南厲王子楚元王子梁孝王子則推親親之恩而封矦者也異信惟長沙王子吳淺長沙嗣成王子吳陽長沙王相利倉則以吳芮忠而無功得矦者也外戚若吕后姊子吕后兄子吕后諸昆弟子吕氏王子孝文太后弟薄昭孝文后弟竇廣國后兄竇長君子彭祖孝景后兄王信孝景后母弟田蚡田勝長公主嫖子蟜張敖魯元太后子齊哀王舅父駟鈞淮南厲王舅父趙兼則所謂恩澤矦者也有死事而其子得矦者若匈奴入北地力戰死事之孫卬趙相建徳不聴王遂反而死内史王慎亦不聴王遂反而死楚太傅趙夷吾不聴王戊反而死楚相張尚亦不聴王戊反而死是也此外高祖時有哭彭越之欒布當烹出忠言帝赧之以為都尉而有功得矦者也有外國歸義自匈奴降漢而矦者凡七人其故韓王信之孽子與其太子之子故燕王盧綰之子則漢人歸自匈奴者也董份曰太史公獨以長沙起論即賈生所謂欲諸王之忠附則莫若令如長沙反覆論敘以見其國小而得完見疆土之不可盛而矦王之不可不忠也讀惠景間矦者年表補漢約非有功不矦其不謂之功臣年表何也按表惠景間矦者凡九十四人内王子矦者及外戚恩澤矦者凡四十九人則以功封及以功廕者四十五人耳高祖功臣年表外戚僅二人王子僅四人兵爭之日亦共歴艱難故皆謂之功臣也是未可比而同之高后時矦者三十一人不數年坐吕氏事誅一十三人身死名惡為世大戒而人卒不悟何也孝景吳楚之變以軍功矦者凡七人死事矦者四人當時七國雖横皆同氣也身為天子既不能篤親親之仁以服其心又不善防禦之以弭其釁遽發大難使骨月傷殘士民蹂躙倖免覆亡論功行賞之日帝亦有悔心否乎景帝以匈奴降侯者凡八人初匈奴王之來帝欲矦之以勸後周亞夫曰彼背其主而降侯之則何以責人臣不守節者乎帝不聴悉矦之亞夫之言以理論耳即以事勢論匈奴之性服叛無常降何利之有彼來降不可拒厚蓄之而已尊之以矦是使匈奴有輕中國之心其失與和親同又何以勸甚矣帝之愚也或謂文帝時已行之蓋文帝所矦者固韓王信之子孫其父叛其子復歸是能反之正者矦之可也然亦過矣存疑孝文矦者二十九人其中章武矦竇廣國南皮矦竇彭祖乃孝景即位始封班入景表是孝景矦者三十一人其中休矦紅矦實一人並書誤也班表但一書為是又武安矦田蚡周陽矦田勝乃孝武即位始封班入武表是
