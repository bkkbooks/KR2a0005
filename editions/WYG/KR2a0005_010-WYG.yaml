body:
  text: 讀史記十表卷十南陽汪越撰漢興以來將相名臣年表第十黄履翁曰將相名臣表以六事為主所以觀君臣之職分讀史記十表卷十讀漢興以來將相名臣年表此表年經而人緯冠年于上以元起數者高祖孝惠高后孝文孝景孝武即位之年也列年于中以一二起數者則蕭何曹參王陵陳平周勃諸人為相及將在官之年也相必記年將則有年者有不年者御史大夫皆不年讀將相名臣年表以大事為主大事記索隱云謂誅伐封建薨叛大事者天子之事也而見於將相名臣表者何將相代天子而行之者也觀其事可察人君治忽之機即可定人臣賢不肖之分非極有關繋者不屑屑書故曰大事記大事首誅伐以漢用兵取天下入秦破楚臣同列諸侯功臣異姓王者俱征滅之至景帝時定吳楚七國匈奴世為漢患武帝屢出師是也次封建則同姓諸侯王及推恩封王子侯是也首表劉仲為代王表楚元王齊悼惠王來朝表諸侯皆至長安明親親之恩上下無猜也諸侯王薨則表如齊悼惠王淮陽王梁孝王言其宜後也叛則表魏豹反韓信反陳豨反代地彭越黥布反高帝諸功臣也同姓諸侯王反者濟北王興居吳楚七國淮南衡山也表匈奴凡十平城一也攻代王二也入上郡三也入蕭關四也入上郡雲中五也敗代守六也入襄代上郡七也敗代都尉八也入雁門代郡九也入右北平定襄十也索隱之説當矣然不止此也如高祖二年立太子五年入都關中皆冠于上如破項籍春踐皇帝位如尊太公為太上皇其後如城長安赦無所復作赦齊除諸侯丞相為相置孝弟力田行八銖錢除收孥相罪律除謗誹律除肉刑郊見上帝見渭陽五帝地動河决改厯以夏正月為嵗首皆索隱所未該至于表太公自楚歸表未央宫奉太上皇夀表為高祖立廟沛為立孝文皇帝廟郡國為太宗廟表置諸陵此何等事而可忽諸若夫髙后立少帝廢少帝更立𢎞王吕産吕禄其後大臣誅諸吕迎代王即帝位漢不絶如帯僅而復興表於此者正以明後之誅亂定䇿不為無功則前之阿吕后亂漢約惡得無罪也不然帝紀外戚世家已詳矣平勃諸人列傳又言之矣而復挈於表何哉漢書百官公卿表詳一代之官制史記但表相與將御史大夫意在論世知人以備勸懲故舉其大者不在備官若曰于此得賢任職斯可也建元以來武功侯者七十二國而衛霍功最高然北討胡南誅越又以通大宛烏孫龜兹諸國及西南夷海内虛耗幾田輪臺太史公不敢斥言惟表曰南夷始置郵亭其微㫖歟表新垣平詐言方士覺誅之此諷武帝也以孝文而有玉杯改元之失况後之王者乎黄龍見成紀寳鼎出汾陰皆不為瑞况于求神仙冀黄金成而河决可塞乎封禪書大㫖即此具矣大事記附表丞相薨卒免及自殺者何重相也相得其人則書惜之也相非其人則亦書幸之也不于相位書而表于大事記正以見相之重也凡表相薨卒免自殺于大事記皆變文倒置者何古之人未嘗言及此也竊臆揣之此記中表太上皇崩表高帝曰上崩孝文皇后崩孝文太后崩孝景太后崩及諸王薨而丞相薨卒亦書如故是無别也雖輟朝臨祭大臣有異數而書之遂同國䘏可乎然則太尉置罷表于相位而倒置御史大夫死抵罪自殺表于將位而亦倒置何也恐此或便觀覽未必有深義也存以質史學淹通之君子相位索隱云置立丞相太尉三公漢書百官公卿表相國丞相皆秦官掌承天子助理萬幾應劭曰丞者承也相者助也秦有左右高帝即位置一丞相十一年更名相國孝惠高后置左右丞相許應元曰漢右丞相在左丞相上文帝二年復置一丞相後哀帝元夀元年更名大司徒太尉秦官掌武事應劭曰自上安下曰尉武帝建元二年省元狩四年初置大司馬以冠將軍之號後成帝時大司馬禄比丞相太𫝊古官高后元年初置王陵審食其皆嘗為之尋罷太師太保皆古官茅坤曰漢三公並虛額將相索隱云命將興師漢百官表前後左右將軍皆周末官秦因之位上卿漢不常置或有前後或有左右皆掌兵及四夷茅坤曰大約漢制太尉即今之本兵而前後左右即今之五府也林駰曰高祖二年拜曹參為假左丞相葢漢初以丞相征伐而借名未嘗居位如韓信以左丞相撃魏樊噲以定韓王信遷左丞相酈商以破臧荼遷左丞相按高帝十一年周勃為太尉主攻伐武帝後元元年以光禄大夫霍光為大將軍元狩四年大將軍衛青為大司馬大將軍驃騎將軍霍去病為大司馬驃騎將軍索隱以命將興師釋將相者殆此類非凡將軍皆可謂之為將相也御史大夫位索隱云亞相漢百官表御史大夫秦官位上卿掌副丞相應劭曰侍御史之率故稱大夫云後成帝綏和元年更名大司空大書丞相蕭何守漢中守關中褒元功也相曹參何所舉以自代將薨帝臨視問之而舉參也孝惠六年相王陵陳平遵高帝臨崩之命也周勃亦以遺命為太尉遂安劉氏漢初之相蓋如此有自太尉而為丞相者綘侯周勃潁陽侯灌嬰條侯周亞夫武安侯田蚡四人建元元年上議置丞相太尉籍福説武安曰即上以將軍為丞相必讓魏其將軍必為太尉太尉丞相尊等耳又有讓賢名是漢制太尉與丞相等也有自御史大夫為丞相者張蒼申屠嘉陶青劉舍衛綰公孫𢎞李蔡莊青翟石慶自太初後凡九人漢稱制詔丞相御史制詔御史是御史大夫亞于丞相貴于諸卿也大書御史大夫周苛守滎陽者嘉死節也漢以關中為根本而與楚相持滎陽其重地睢水敗敖倉數被侵奪諸侯背漢紀信誑楚脫髙帝苛守滎陽䧟為羽所烹時天下未定漢未嘗定官制則御史大夫者不過假秦官以授之權而已太史公表御史大夫必首苛以志官所由始實重其人也書太尉盧綰例雖似同但綰後九月即封燕王無事可表卒以叛亡匈奴非苛倫也凡命將興師有大將軍有前後左右將軍而將軍有屬大將軍者有不屬大將軍者其為將軍有侯者有不侯者丞相不言長史司直太尉亦不言官屬御史大夫不言侍御史員而列將軍則備書之邉事所倚以辦雖偏禆不敢畧也且以責戰守之實功焉御史大夫周昌以貴彊徙為趙王如意相吕后酖王昌憤以死不書卒吕后以非罪殺趙堯書抵罪不言所坐皆刺高后也御史大夫鼂錯誅漢書表云錯有罪腰斬而太史公不書謀削七國忠而受禍為景帝諱有微詞矣史表有御史大夫敬据漢書典客馮敬有御史大夫歐据漢書中尉張歐此可以証明而得之者也班固曰劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辯而不華質而不俚其文直其事核不虚美不隱惡故謂實錄司馬貞曰太史公其人好竒而詞省故事覈而文微葉清臣曰史記其意深逺則其言愈緩其事愈碎則其言愈簡此詩春秋之意也吕祖謙曰太史公書法微而顯絶而續正而變文見於此而起意在彼可不參考互觀究其大指之所歸乎右班氏以下四家之説採自諸家史論中讀十表可以想見當日筆削之微意焉讀漢興以來將相名臣年表補讀將相名臣表固以大事為主但觀其所書必于其所不書者參互考核乃知所書之義高帝約法三章及為義帝發喪是滅秦破楚之本不書何也約法在未為漢王前已見月表發喪非其本意凌以棟云不過假羽失著迫取天下耳觀異日置秦皇楚衛齊趙冢田横亦為改塟何獨于義帝寥寥耶劉鳯云漢王棄其父若敝屣于義帝何有而為之縞素此不書亦春秋誅意之法元年書沛公為漢王之南鄭是項羽之更立也不言羽立見沛公之能自詘也漢王以羽負約怒欲攻之以蕭何言即止二年書立太子四年書太公自楚歸並書于䇿其義自見也五年封諸侯王不書不保其終也六年封功臣及封兄荆王賈弟楚王交子齊王肥不書獨書劉仲為代王何也以眀年匈奴冦代仲棄歸廢為合陽侯夫平城之圍帝幾不免何責于仲耶身為天子不能保一兄之封故特繫于尊太公為太上皇之下見不友非所以為孝也九年遣劉敬使匈奴和親不書為内諱也未央宫帝上太上皇夀書帝語譏反唇也十年令諸侯王立太上皇廟不書生事不以禮故削之也十一年詔郡國求遺賢不書未得賢也四皓有曰陛下輕士善罵臣等義不受辱故恐而亾匿十二年祠孔子不書缺也孝惠二年書楚元王齊悼惠王來朝凡來朝不書書此者以齊之倖而免也三年與匈奴和親不書為内諱也四年除挾書律不書缺也五年書為高祖立廟沛置歌兒百二十人事亾如存也高祖十二年置酒沛宫發沛中兒得百二十人教之歌酒酣高祖撃筑自為歌詩令習之高后元年王孝惠諸子不數疑辭也二年書行八銖錢重民用也故孝文五年除錢律孝武五年行三分錢皆書六年書晝昏紀變也吕后惡之曰此為我也凡災異不悉書書者有為也孝文元年書除收孥相罪律首施仁也書立太子樹國本也南越王稱臣不書外事也二年書立皇子武參勝為王凡封皇子皆書封王子不書尊王也初有司請立皇子為王詔先立河間城陽濟北然後立皇子高帝時封皇子肥長建如意恢友恒亦不書傷功臣也六年匈奴請和親不書為内諱也十五年親䇿賢良能直言極諫者不書未得賢也書黄龍見成紀上始郊見雍五帝見渭陽五帝謹始也後元年書誅新垣平大改過也故前以垣平為上大夫不書後二年書匈奴和親前此不書此獨書何也前六年和親十一年冦狄道是年又和親後六年又冦上郡雲中以帝之徳天下之治安和親不足恃如此故一書焉為鍳也孝景元年匈奴入代與約和親不書為内諱也四年立皇子徹為膠東王不書避所諱也五年遣公主嫁單于不書為内諱也六年廢皇后薄氏不書諱也外戚世家云景帝為太子時薄太后以薄氏女為之妃及即位立為后無子無寵薄太后崩廢薄皇后夫后不聞有罪又太后所立太后崩即廢帝亦忍矣帝本紀缺其事或武帝削之歟衛宏漢書儀註云太史公景帝紀極言其短武帝怒削去孝孫補之七年書廢太子榮為臨江王四月丁巳膠東王立為太子譏易樹子也中元四年書臨江王徵自殺譏帝也書塟藍田燕數萬為銜土置冡上記異且隱之也六年書分梁為五國王梁孝王諸子封王子不書書者美順親也陳子龍曰既以悦太后又以分梁國非也是時梁王薨太后哀哭不食帝憂懼不知所為盡立孝王子太后乃説為帝加一餐則分削國邑爾時念不到此孝武建元元年舉賢良方正直言極諫之士不書賢不用也時得董仲舒以為江都相未竟大用二年書置茂陵豫凶事也丘濬曰初即位即置陵邑古人不以豫凶事為忌三年書東甌王來降始外事也中元三年匈奴降侯七人不書獨書此者志武帝事四夷之始此後邉事屢書矣五年置五經博士不書缺也丘濬曰秦焚詩書惟存博士官五經為世大禁漢興稍稍復出然皆私相傳習于其家至是官始置五經博士然後天下靡然向風公相授受以為世業武帝有功儒教豈小小哉元光二年書帝初之雍郊見五畤始神事也四年族灌夫棄魏其侯市灌夫例不書書為魏其譏枉殺也元朔元年書衛夫人立為皇后立后不書書譏之也外戚世家衛皇后宇子夫生微矣末論李夫人尹媫妤之屬云皆以倡見非王侯有土之女士不可以配人主葢微譏之也元狩元年立子據為皇太子不書諱也四年方士少翁伏誅不書諱也本紀云誅文成將軍而隱之上後悔復用欒大封五利將軍元鼎四年書立常山憲王子平為真定王商為泗水王凡立王子不書書此者帝哀憲王之廢故封其子是為能友非他分邑比也五年欒大伏誅不書諱也大既誅又拜公孫卿為大夫幸緱氏觀仙人跡元封元年帝出長城登單于臺勒兵還不書危也時遣郭吉告單于曰單于能戰天子自將待邉不能亟來臣服單于怒留吉上乃還封禪不書妄也封禪書末云方士言神仙者彌衆然其效亦可覩矣葢諷之也太初元年書改厯以正月為嵗首行夏時也天漢四年立皇子髆為昌邑王不書削也相免薨卒自殺皆書將御史不書專重相也周苛守滎陽死則書予節也太僕汝隂侯滕公卒則書賢之也堯抵罪則書無罪也湯有罪自殺則書誅不仁也韓安國屯漁陽卒則書以安國嘗行丞相事也惟孝景後二年書御史大夫岑邁卒未知何義漢表亦無其人孝武朝相十二人棄市斬自殺者凡六人其相位之殆如此此公孫賀之所以哀也存疑索隱于相位云置立丞相太尉三公其實太尉屬將位特置罷倒書相位耳故漢百官表三公與丞相並太尉與大司馬並雖云與丞相等尊位次自在丞相下將位一本作將相後人强釋之疑將相本訛也從將位為是天官書有將位星高后元年陵免相不書疑缺八年七月卒巳為帝太𫝊九月丙戍復為丞相此審食其也疑缺孝文十年書諸侯皆至長安按諸侯王表是年惟長沙王來朝他國前朝不一年楚王戊十三年乃朝本紀亦無此疑誤孝景後元年下周亞夫獄不食死例當書疑缺御史大夫自孝文以後史表與漢百官表多異疑從漢書為是葢漢御史大夫只一人漢書孝文四年圍七年馮敬十六年申屠嘉後元二年陶青孝景二年錯四年介七年劉舍中三年衛綰後元年直不疑孝武元年牛抵二年趙綰四年莊青翟六年安國元光四年張歐元朔三年公孫𢎞五年畨係凡此叙遷甚明史表孝文四年嘉為御史大夫後二年嘉相計十四年乃孝文九年又載御史大夫敬是同時有兩御史也故從漢書四年圍七年敬十六年嘉為是漢書嘉傳亦云十六年為御史大夫又孝景四年史表有御史大夫蚡按蚡傳孝景時為中大夫並未遷御史大夫孝武元年始封蚡武安侯為太尉則蚡疑介字之訛當從漢表四年介為是又史表孝景六年有御史大夫陽陵侯岑邁漢表無之元朔五年漢表有畨係史表無之按岑邁無所考若畨係則史表缺耳當元朔三年公孫𢎞為御史五年𢎞相應有繼為御史者史未有載至元狩元年乃書御史大夫蔡此三年中御史不應缺又從漢表為是雖圍與介與係與邁皆無傳可考以次求之漢書固為明也班固云司馬遷記事訖于天漢自此以後後人所續按史公大事記筆削本朝尤其精意所在前人謂得詩春秋之意是不誣司馬貞弗索其義但以六事槩之陋矣因為比事參觀發明篇末其意義顯爍衆見者不費辭也若褚孝孫所續太始以後觕舉數事事多缺㫖亦無取故不論
