body:
  text: 讀史記十表卷五南陽汪越撰漢興以来諸侯年表第五索隠曰應劭云雖名為王其實如古之諸侯太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義襃有德也太公於齊兼五侯地尊勤勞也武王成康所封數百而同姓五十五地上不過百里下三十里以輔衛王室管蔡康叔曹鄭或過或損厲幽之後王室缺侯伯彊國興焉天子㣲弗能正非德不純形勢弱也漢興序二等韋昭曰漢封功臣大者王小者侯也髙祖末年非劉氏而王者若無功上所不置而侯者天下共誅之髙祖子弟同姓為王者九國徐廣曰齊楚荆淮南燕趙梁代淮陽索隠曰徐氏九國不數吳蓋以荆絶乃封呉故也仍以淮陽為九今案下文所列有十國者以長沙異姓故言九國也唯獨長沙異姓而功臣侯者百有餘人自雁門太原以東至遼陽為燕代國常山以南太行左轉度河濟阿甄以東薄海為齊趙國自陳以西南至九疑東帶江淮榖泗徐廣曰榖水在沛薄㑹稽為梁楚吳淮南長沙國皆外接於胡越而内地北距山以東盡諸侯地大者或五六郡連城數十置百官宫觀僭於天子漢獨有三河東郡潁川南陽自江陵以西至蜀北自雲中至隴西與内史正義曰京兆也凡十五郡而公主列侯頗食邑其中何者天下初定骨肉同姓少故廣彊庶孽以鎮撫四海用承衛天子也漢定百年之間親屬益踈諸侯或驕奢怵邪臣計謀為滛亂索隠曰怵音誓爾雅云怵猶紐也紐亦訓習大者叛逆小者不軌於法以危其命殞身亡國天子觀於上古然後加惠使諸侯得推恩分子弟國邑索隠曰案武帝用主父偃言而下推恩之令也故齊分為七徐廣曰城陽濟北濟南菑川膠西膠東是分為七趙分為六徐廣曰河間廣川中山常山清河梁分為五徐廣曰濟隂濟川濟東山陽也淮南分三徐廣曰廬江衡山及天子支庶子為王王子支庶為侯百有餘焉吳楚時前後諸侯或以適削地索隠曰適音宅或作過是以燕代無北邊郡吳淮南長沙無南邊郡如淳曰長沙之南更置郡燕代以北更置縁邊郡其所以饒利兵馬器械三國皆未之也正義曰景帝時漢境北至燕代燕代之北未列為郡吳長沙之國南至嶺南嶺南越未平亦無南邊郡齊趙梁楚支郡名山陂海咸納於漢諸侯稍㣲大國不過十餘城小侯不過數十里上足以奉貢職下足以供養祭祀以蕃輔京師而漢郡八九十形錯諸侯間犬牙相臨索隠曰錯謂交錯相銜如犬牙秉其阨塞地利彊本幹弱枝葉之勢也尊卑明而萬事各得其所矣臣遷謹記髙祖以来至太初諸侯譜其下益損之時令後世得覽形勢雖彊要之以仁義為本起髙祖元年至孝武太初四年徐廣曰孝武太始二年廣陵中山真定王来朝孝宣本始元年趙来朝二年廣川来朝四年清河来朝孝宣地節元年梁来朝二年河間来朝三年濟北来朝濟北分平原太山二郡讀史記十表卷五讀漢興以來諸侯年表蔡邕曰漢制皇子封王其實諸侯也周末諸侯或稱王而漢天子自以皇帝為號故以王名者總諸侯也讀諸侯年表以天子為主冠漢帝紀年于上尊天子也下紀諸侯之事書始封國名都某地某年封某後或反誅或有罪自殺國除或徙王或廢為侯或無後國除皆書繼世者書王某元年遂以次紀年必表來朝者明不失臣節也有自王為帝者文帝之于代武帝之于膠東也按膠東齊悼惠王子雄渠反誅景帝四年王子徹于膠東是為孝武帝然孝武稱謚後人所加觀自序云作今上本紀稱今上者子長文也有自太子廢為王者景帝太子之為閔王封于臨是也髙后之時自王而為帝者少帝義由常山王立常山始哀王不疑少帝入立改封軹侯朝淮陽封懷王彊皆非真惠帝子表紀時事亦不能竟没之也漢書無惠帝子王者削之也有同姓國廢而改封異姓者髙后之王諸呂非漢制也有異姓國廢而改封同姓者長沙始吳芮無後改封定王發景帝子魯始張偃後為恭王餘亦景帝子是也表列同姓九國而異姓獨長沙呉芮然楚始韓信淮南始英布燕始盧綰趙始張耳梁始彭越代始韓王信皆異姓也見秦楚之際月表漢書見異姓諸侯王表蓋漢得天下初封功臣楚為大梁次之淮南又次之趙又次之燕代為弱髙祖心害六王之能叛漢也裂土而畀之初非得已至于夷滅皆盡而以樹同姓遂仍其故不虞復為異日之患也太史公以其懲秦孤立封建過制故以周初封國及厲幽之後言之太史公序形勢二字其主意也侯國強則王室弱侯國弱則王室強故于諸國先言其強域之大又言漢所有僅自三河至于内史此形勢在侯國也後言推恩分子弟國邑厯舉諸國分裂之數與天子支庶王子支庶尊卑之等其支郡山海咸納于漢與漢郡錯諸侯間此形勢在王室也一篇之中反覆照應而結之以仁義為本與周之親親尊勞同道封建所以公天下其義自見秦罷侯置守分天下為三十六郡蓋懲周末諸侯遂廢封建漢復懲秦孤立而封建同姓錯處郡縣間諸侯反者數起何哉無制故也陳仁子曰國大則賦多賦多則兵強其為亂也易國小則賦微賦㣲則兵寡其為亂也難古制公侯百里伯七十里子男五十里不能五十里者附于諸侯曰附庸如此則國小變遲猶未至吳楚之亂近在目睫也按以勢論此言近之矣然漢髙猜忌功臣誅鋤異姓而七國之禍乃在宗親故曰形勢雖彊要以仁義為本衆建諸侯而少其力此賈誼之策以之干文帝者至景帝用鼂錯謀削七國山東諸侯皆反武帝用主父偃之説使推恩子弟分其國邑乃不削奪而自析矣然班固有言抑損諸侯減黜其官惟得衣食租税不與政事至哀平之際皆繼體苗裔親屬疎逺不為士民所尊王莾知漢中外殫微本末俱弱無所忌憚生其姦心顓作威福詐謀既成遂據南面之尊分遣五威之使馳傳天下班行符命漢諸侯王厥角稽首奉上尊韍惟恐在後或廼稱美頌徳以求容媚豈不哀哉夫秦滅古法内無骨肉根本之輔外無尺土藩翼之衛漢矯枉過正籓國大者夸州兼郡宮室百官同制京師始嘗患宗室之過強至于其後义患在宗室之過弱讀此表者必通王子侯年表考之而漢一代封建之制利害乃盡矣讀漢興以來諸侯年表補諸侯年表自髙祖六年而後王者皆劉氏耳其初封韓信英布張耳彭越韓王信吳芮盧綰七王已繫之月表不直削仍列于前者月表訖髙祖五年未及載諸國誅廢而長沙獨存亦不得俱没也且建國之始本以功大故王天下既定隨以事誅報功之地盡樹同姓末年令非劉氏不王豈先王親賢並建天下為公之意乎表以功封敘起暨于同姓廢置之間觀者可為太息也序言天子觀于上古推恩子弟索𨼆曰武帝用主父偃言下推恩之令按文帝六年用賈誼策已有衆建之事所云齊分為七趙為六梁為五淮南分三皆在文景時此天子亦統言不必專指武帝也趙𨼆王如意書死燕靈王建書絶趙幽王友書幽死趙共王恢書自殺不言其所由死深痛之也四王事史不各載統入呂后本紀中甚后惡也表特詳國都廢置封爵遷除不紀時事以將相表有大事記也來朝悉書者親親之情尊君之義所當然也凡言反誅反自殺者雖其自取亦上過也如孝文固稱寛仁而濟北王興居之反亦非無由初大臣誅呂氏時朱虚侯章功尤大許盡以趙地王朱虚盡以梁地王東牟及孝文入立聞朱虚東牟初欲立齊王故絀其功及二年王諸子僅割齊二郡以王章興居章興居自以失職奪功章死而興居遂乘匈奴之變反于濟北此由帝一念之私所召致也淮南厲王之反雖其㐫横性成亦帝縱使之過瞽瞍殺人皋陶執之豈有骫天下正法而恣容一弟乎又重自切責乃使舅薄昭為書以戒之彼㐫横者其何能降心也是速之亂耳斗粟尺布之謡當時必非無謂至景帝七國之亂更無論矣髙帝四年立太子不書文帝元年立太子不書獨景帝四年書立太子七年書太子廢譏之也太子榮不聞失徳徒以嗛栗姬故聼長公主之譖輕易國本故是表于反誅外凡以罪廢者不詳其罪名獨書臨江王坐侵廟壖垣為宮自殺夫壖垣廟境外之墟邊也罪亦細矣何遽使中尉簿責蹙令自殺耶方太子之被徵也祖江陵北門江陵父老俱流涕是必有以感人者帝奈何立之而廢之而殺之史稱帝刻薄信哉存疑表太初二年泗水思王商薨子哀王安世嗣即戴王賀元年安世弟按漢書安世立一年薨亡後太初三年戴王賀以思王子紹封史五宗世家哀王安世立十一年卒無子上憐泗水王絶乃立安世弟所云安世嗣立之年俱與表不符賀為思王子安世弟則同索𨼆曰賀廣川惠王子此悞也蓋以廣川惠王孫戴文王訛耳
