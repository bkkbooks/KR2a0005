body:
  text: 讀史記十表卷六南陽汪越撰髙祖功臣年表第六正義曰髙祖初定天下表明有功之臣而侯之若蕭曹等太史公曰古者人臣功有五品以德立宗廟定社稷曰勲以言曰勞用力曰功明其等曰伐積日曰閲封爵之誓曰使河如帶泰山如厲國以永寧爰及苗裔始未嘗不欲固其根本而枝葉稍陵夷衰㣲也余讀髙祖侯功臣察其首封所以失之者曰異哉所聞書曰協和萬國遷於夏商或數千歳蓋周封八百幽厲之後見於春秋尚書有唐虞之侯伯歴三代千有餘載自全以蕃衛天子豈非篤於仁義奉上法哉漢興功臣受封者百有餘人索𨼆曰案下文髙祖功臣百三十七人兼外戚及王子凡一百四十三人受封天下初定故大城名都㪚亡戸口可得而數者十二三索𨼆曰言十分纔二三在耳是以大侯不過萬家小者五六百户後數世民咸歸鄉里户益息蕭曹絳灌之屬或至四萬小侯自倍索𨼆曰倍其初封時户口也富厚如之子孫驕溢忘其先滛嬖至太初百年之間見侯五正義曰謂平陽侯曹宗曲周侯酈終根陽河侯齊仁戴侯秘䝉穀陵侯馮偃也餘皆坐法隕命亡國耗矣罔亦少宻焉然皆身無兢兢於當世之禁云居今之世志古之道所以自鏡也未必盡同帝王者各殊禮而異務要以成功為統紀豈可緄乎孚逺曰此數語無註蓋不敢斥言漢家少恩故為𨼆語也觀所以得尊寵及所以廢辱亦當時得失之林也何必舊聞於是謹其終始表見其文頗有所不盡本末著其明疑者闕之後有君子欲推而列之得以覽焉讀史記十表卷六讀髙祖功臣年表讀功臣年表以侯功為主按漢書髙祖八年天下平論功定封訖十二年侯者百四十有三人又作十八侯位次髙后二年詔丞相陳平盡差列侯之功録第下竟藏諸宗廟副在有司太史公所表侯第是也韋昭曰漢封功臣大者王小者侯也按功臣封王在髙帝四年五年間是時天下初定如韓彭等不得不王之耳自六年以後漢約非劉氏不王非軍功不侯索𨼆曰漢書音義云曹參功第二而表在首蕭何功第一而表在十三者以封有先後故也索𨼆曰封參在六年十二月封何在六年正月髙祖十月因秦改元故十二月在正月前也表侯功太約從起豊沛從至霸上定秦從至漢中從滅項羽功之大者也餘功如從大將擊齊魏擊趙韓燕代定諸侯如䕶太公呂后如奉孝惠魯元公主如解鴻門如為漢守如從擊黥布彭越陳豨盧綰韓王信等皆表而出之明不與恩澤侯同也凡有罪失侯者大約如酎金如為太常犧牲不如令如為太常酒酸罪之輕者也餘罪如為太守知民不用赤仄錢為賦如不償人責如尚南宮公主不敬如出入屬車間如坐出界如買塞外禁物如入上林謀盜鹿如為太常與樂舞人闌入凾谷關如賣宅縣官故貴猶皆在可議之列也餘重罪則謀為大逆大不敬過律姦淫畧人傷人摠之所謂不奉上法者也或但云有罪疑獄也不明所坐或史闕之按太史序曰漢興功臣受封者百有餘人至太初百年之間見侯五餘皆坐法隕命亾國嘆不能副河山帶礪之誓而苗裔衰微也今第追録侯功謂察其首封所以得尊寵而各書罪狀國所自除則所以失之而致廢辱者責在下矣故曰當世得失之林也然本其先天下初定大都名邦户口散亾漸以益息乃至富厚未幾子孫驕溢不能篤于仁義奉上法以自取戾而首稱功有五品以深致欷歔之意且夫協和萬國遷于夏商或數千嵗何古者封建之澤長而今兹之促也惜哉其罪累上毋亦使人謂漢法之過嚴乎此下四表皆國經而年緯凡標國名侯功于端以貫其下者縱也標髙祖孝惠髙后孝文孝景與建元至太初已復準王朝厯數以紀諸侯之年者衡也前十二諸侯年表以下皆年經而國緯故冠帝年于端體各不同也何謂準王朝厯數定諸侯之年如表首平陽侯曹參在髙祖朝以六年十二月封是其元年盡髙祖十二年凡七年其在孝惠朝凡五年合計之何在位十二年子窟嗣盡孝惠七年凡二年其在髙后朝八年在孝文朝凡十九年合計之窟在位二十九年子奇嗣盡孝文二十三年凡四年在孝景朝凡三年合計之竒在位七年子時嗣盡孝景十六年凡十三年至孝武元光四年凡十年合計之時在位二十三年子襄嗣至元鼎二年襄在位凡十六年子宗嗣至征和二年坐太子死國除宗在位凡二十四年自參始封至此凡百一十一年而國除也餘俱放此上表侯功下表侯第而首序列帝相承得年若干蓋六朝百有餘歳侯家之盛衰始卒具見矣是故以國為經以年為緯也讀髙祖功臣年表補功臣年表以功論也自外戚周呂侯澤建成侯釋之王子羮頡侯信合陽侯喜徳侯廣沛侯濞外凡百三十七人皆功臣侯者食邑多寡以功差獨其中有射陽侯纒即項羽季父項伯以鴻門解難破羽降漢得侯慎陽侯樂説以淮陽舍人告反得侯期思侯賁赫以黥布中大夫告反得侯非所以教忠也辟陽侯審食其以侍從呂后入楚一嵗得侯非所以正體也使蕭曹良平與此等伍並掲于表為之氣塞也或云項伯有救太公功故丁公可斬項伯當報非也當太公在楚亦倖免耳帝為人子謂何乃歸功項伯乎故史表漢表但云破羽不及救太公俎上事其㫖微矣直云破羽併誅項伯也漢王之敗彭城審食其從太公呂后間行求漢王反遇楚軍表云以舍人初起侍呂后孝惠沛三歳十月呂后入楚食其從一歳侯漢表亦同但云從呂后不及太公亦微辭也羮頡侯表云信母嘗有罪髙祖微時太上憐之故為羮頡侯語詳楚元王世家夫仁人之于兄弟不藏怒宿怨況嫂媍人櫟釡小忿何怨之有兄子猶子也以太上之言乃得封且名羮頡以辱之帝亦忍矣嗟乎羮頡之號不仁辟陽之封不智帝將謂善謔耶不顧天下後世笑譏乎功臣子孫以罪失侯輕重無足論其中有無後國除者如魯侯奚涓棘陽侯杜得臣義陵侯吳程世絶無可繼除之非得已也若無嫡嗣有支庶未始不可後孝文以側室子後天子侯何異耶如清陽侯王吸廣侯召歐費侯陳賀都昌侯朱軫海陽侯揺母餘肥如侯蔡寅髙胡侯陳夫乞澤陽侯呂騰深澤侯趙將夕猗氏侯陳遫共侯盧罷師襄平侯紀通繁侯強瞻宣平侯張敖東陽侯張相如禾成侯公孫耳寧陵侯呂臣陽義侯靈常鄢陵侯朱濞先以無後國除及元康四年皆以其曽元詔復家則非無支庶可繼者何為乎即除也故君子謂孝宣賜復哀平紹封皆盛徳事也存疑表載功封始自髙帝六年十二月至十二年六月止漢表同按髙帝于十二年四月甲辰崩五月丙寅葬長陵不應有六月封侯之事或在孝惠即位後耶不應入髙表此必有誤也
