body:
  text: 讀史記十表卷三南陽汪越撰六國表第三太史公曰讀秦記至犬戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僭端見矣禮曰天子祭天地諸侯祭其域内名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚于郊祀君子懼焉及文公踰隴攘夷狄尊陳寳營岐雍之間而穆公修政東竟至河則與齊桓晉文中國侯伯侔矣是後陪臣執政大夫世祿六卿擅晉權征伐㑹盟威重於諸侯及田常殺簡公而相齊國諸侯晏然弗討海内争于戰功矣三國終之卒分晉田和亦㓕齊而有之六國之盛自此始務在彊兵并敵謀詐用而從衡短長之說起矯稱蠭出誓盟不信雖置質剖符猶不能約束也秦始小國僻逺諸夏賓之比于戎翟至獻公之後常雄諸侯論秦之德義不如魯衛之暴戾者量秦之兵不如三晉之彊也然卒并天下非必險固便形勢利也蓋若天所助焉或曰東方物所始生西方物之成熟夫作事者必於東南収功實者常於西北故禹興于西羌皇甫謐曰孟子稱禹生石紐西夷人也湯起于亳周之王也以豐鎬伐殷秦之帝用雍州興漢之興自蜀漢秦既得意燒天下詩書諸侯史記尤甚為其有所刺譏也詩書所以復見者多藏人家而史記獨藏周室以故㓕惜哉惜哉獨有秦記又不載日月其文畧不具然戰國之權變亦有可頗采者何必上古秦取天下多暴然世異變成功大傳曰法後王何也以其近已而俗變相類議卑而易行也學者牽于所聞見秦在帝位日淺不察其終始因舉而笑之不敢道此與以耳食無異悲夫余于是因秦記踵春秋之後起周元王表六國時事訖二世凡二百七十年著諸所聞興壞之端後有君子以覧觀焉周秦魏獻子韓宣子趙簡子楚燕齊讀史記十表卷三讀六國表讀六國表以秦為主周之後漢之先序所謂因秦紀踵春秋後表六國時事是也冠周于上周雖衰未亡也至赧王五十九年卒而絶不即予秦者秦未并天下也蓋闕不書王者三十三年始皇二十八年六國皆㓕乃書其年于上以代周東周西周不書王以自貶為君卑若縣鄙不成王也周無事可書書齊威王朝周兩書賀秦書致胙于秦書諸侯會致伯秦秦代周之徴也書九鼎震亡徴也書王子定奔晉王室難也書東周惠公薨自貶也于秦表則書曰天子致胙曰天子致伯曰諸侯畢賀曰㑹諸侯于澤朝天子曰天子賀曰天子致文武胙皆以傷王室而必正其名也曰取西周王曰呂不韋取東西周周始亡然不于周書者不予秦之㓕周也表秦詳於六國何也秦自為一代之制故置官書為賦書作上下畤書塹河築城書為縣書開阡陌書令吏帶劍為縣有秩史書行錢書初臘書置丞相書初置三川郡書初置東郡書百姓納粟拜爵書天下大酺書俱在始皇并天下二十八年前蓋先王封建井田周官周禮已盡湮于是矣此太史公微意也秦㓕六國以六國自相㓕也表于攻伐抜地納地助擊助㓕俱詳載合觀之可以見秦并天下之大機焉表魏則大書云孟子來特識也王問利對曰君不可言利載問答者為戰國所無也前表文侯受經子夏同意魏韓趙三國其始猶表晉晉未亡也晉定公卒其後出公哀公幽公皆表元年而無事可書政不在公室也趙襄子與知伯分范中行又與魏桓子韓康子敗知伯于晉陽三分其地蓋周定王之十五十六年事而晉則為哀公時也至周威烈王二年魏文侯斯元年韓武子元年子景侯䖍趙㐮子卒弟子嘉立為趙桓子元年卒明年國人立襄子子晚是為獻侯于是三國皆紀年而晉無年表魏文侯五年誅晋幽公立其弟止為晉烈公亦無年表至周威烈王二十三年魏韓趙初列為諸侯而晉卑矣然晉猶表孝公傾元年又表静公元年至周安王之二十六年魏韓趙㓕晉分晉國晉絶無後然後晉乃亡齊始平公五年至二十五年宣公立五十一年康公立十九年政皆在田氏也田和始列為諸侯遷康公海上食一城事在周安王之十六年又六年康公卒田氏遂并齊而有之太公望之後絶祀而威王始以齊強天下又三年而三晉亦㓕其君分晉國先是齊桓公十四年陳完自陳來奔田氏始此也晉景公十二年始置六卿後齊政歸田氏晉六卿强誅公族分其邑各使其子為大夫晏嬰叔向嘗相與語嬰曰齊政歸田氏叔向曰晉公室卑此所謂履霜堅氷至國之大戒也六國附見之小國凡十秦表之有蜀義渠也魏表之有衛也韓表之有鄭也趙表之有代也有中山也楚表之有魯也有蔡也莒也齊表之有宋也太史公紀其君多為書元年何也蜀義渠僻在庸髳邊鄙小邑莒代亦微而魯宋鄭衛春秋時為上國蔡為周親中山又周公之孫西周桓公之子皆枝梧延息于諸雄之側至秦㓕蜀義渠韓㓕鄭趙與齊燕共㓕中山楚㓕魯㓕莒㓕蔡齊㓕宋惟魏屢加兵於衛而衛君角至秦二世乃廢為庶人故表於此皆不没其年而附著之猶之皋陶庭堅不祀忽諸之慨嘆也昔周之封君蓋八百矣而强侵弱衆凌寡遂至為六國一折而胥入秦此戰國二百九十年之大勢也讀六國表補讀六國表見當日諸侯戰秦者不過洩一朝之忿媚秦者第以偷旦夕之安未見有能自強為天吏者觀漢髙祖約法三章天下歸心則孟子仁者無敵之言實可見諸事效非迂濶也論者不探其本徒咎六國之不能合力以拒秦于當日事理事情事勢均未之得也周威烈王二十三年九鼎震是年始命韓趙魏為諸侯晉三分而秦無敵矣故周亡徵于此也周表書齊威王朝周非美威王傷周也故不入齊周顯王二十六年致伯秦二十七年秦朝周獨書致伯不書朝周者以空名無救于亡也詳書秦表者權在秦也秦表屢書來賂見秦之好貨邦交之以利也秦表屢書斬首數萬至數十萬見秦以嗜殺并天下宜乎祚之不永也日蝕灾異不書于周書于秦表者非獨見於秦分也以周不足係天下之存亡亦無與天戒云耳書五國共擊秦不勝而還繼書齊敗魏趙觀津罪齊也秦嗣君生或書或不書何也有故則書無則否書生靈公書生獻公書惠公太子生書孝公生本紀載孝公之言曰徃者厲躁簡公出子之不寧國家内憂未遑外事諸侯卑秦醜莫大焉故書此見内亂也秦至孝公用商鞅始大秦昭王二年魏表書秦武王后来歸不書秦表何也后無罪不與昭襄之出也本紀云武王取魏女為后無子立異母弟是為昭襄王即位二年庶長與大臣諸侯公子為逆皆誅及惠文后皆不得良死悼武王后出歸魏云及云皆不得良死刑亦濫矣云出歸情亦忍矣故後書宣太后薨譏昭襄之知有母而棄其君母也后薨不悉書始皇七年書夏太后薨明其所自出夏太后莊襄王母書華陽太后薨明其所從立莊襄以華陽故得立十九年書帝太后薨明其既遷而復也十年書太后入咸陽此外無書后薨者秦靈公八年書初以君主妻河為後世教邪之始秦惠文王書初更元年為後世改元之始秦始皇四年書納粟拜爵為後世鬻爵之始於魏書孟子來於齊不書何也聖賢道既不行特一表焉不悉也魏哀王六年書秦來立公子政為太子譏魏之制於人也魏昭王六年書芒卯以詐見重譏使詐也韓表書昭侯不出髙門見不善之可前知也魏獻子韓宣子皆不紀年獨趙襄子紀年何也與智伯分范中行地與韓魏分智伯地釁皆由趙氏地分而晉亡矣故獨入趙表紀年以著之言與者罪襄子也趙悼襄王齊王建入秦置酒無耻也趙八年入秦九年秦即取趙九城書此見媚人之無益也趙表書烈矦欲賜歌者田徐越侍以仁義乃止見陳善之能閉邪也趙武靈王五年書取韓女為夫人十六年書吴廣入女生子何立為惠后二十五年書惠后卒獨詳何也按世家武靈十六年夢見處女鼓琴而歌數言其狀吴廣聞之因納其女娃嬴有寵生子何二十七年乃廢太子章立何為王傳國吴娃死愛弛憐故太子欲兩王之猶豫未决亂起武靈餓死書此見立寵奪嫡為亂之本而猶豫更足以召禍也且亦有命焉初簡子夢之帝所有曰余思虞舜之勳將以其胄女孟姚配而七世之孫吴娃孟姚也武靈簡子七世孫也以簡子之夢合武靈之夢數之前定如此夫蘇秦說六國獨入燕表何也以燕之亡國所由也三晉㓕其君獨入齊表何也傷齊晉之同絶也齊康公表載二十六年按田世家云康公十九年田和立為齊侯稱元年二年和卒子桓公午立六年卒子威王因齊立則康公既遷田氏已紀元矣而表猶紀康公之年迨康公卒乃書威王元年此史公書法也為後来綱目書漢昭烈唐嗣聖之本秦表丞相悉書魏表書卜相書中山君為相書封無忌信陵君韓表書盜殺相俠累書申不害相趙表書以公子勝為相封平原君楚表書張儀來相書黄歇為相齊表書以鄒忌為成侯書孟嘗君歸相齊凡此見相之重也秦表書樗里子擊藺陽庶長章擊楚司馬錯誅蜀任鄙守漢中白起擊伊闕擊楚擊魏破趙蒙武擊齊蒙驁擊趙擊韓破魏王齮擊上黨桓齮擊平陽内史勝取韓王翦拔趙破楚王賁虜魏燕齊君魏表書齊殺将軍龎涓書齊虜公子卬韓表書秦得将軍申差書虜将喜書敗暴鳶趙表書秦敗將軍英書虜將趙荘書藺相如攻齊書趙奢大敗秦書亷頗拒秦書趙括代頗白起破括四十萬書秦敗扈輒楚表書秦敗我將屈匄書敗将軍唐昧書殺景闕書破我将項燕燕表書田單抜我中陽書趙破我殺栗腹書劇辛死于趙齊表書田忌田嬰田盼將孫子為師書殺騎刦凡此見将之重也取地與地必書見土地為彊弱之由六國之割地請和者真失策也書迎女逆婦書夫人來書取女為夫人見姻好之邦干戈隨之和親之不足恃如此後之議以此和匈奴者愚甚也書㓕把㓕莒不叙其君之年杞世家有云微甚不足數也秦昭王五十二年取西周王是年楚考烈王取魯秦莊襄王元年取東西周周絶是年楚㓕魯魯絶周魯之相為存亡如此也諸侯僭稱王自楚外齊威王二十六年首稱王魏㐮王元年與諸侯㑹徐州以相王秦惠文王十三年稱王韓宣惠十年稱王燕易王十年稱王宋君偃十一年亦稱王中山亦稱王國策中山與燕趙為王惟趙武靈王八年五國相王魏韓趙楚燕趙獨否曰無其實敢處其名乎令國人稱君尋亦稱王未紀其年至秦昭王十九年十月為西帝十二月復為王齊湣王三十六年為東帝二月復為王無其實處其名何取乎爾吁周王也後稱君衛侯也貶號曰君彊弱之勢至易名號可嘅也存疑秦惠文王十三年四月戊午魏君為王按周本紀及齊世家楚世家俱載秦惠王稱王在十三年而秦世家獨未載稱王事惟惠王四年言齊魏為王十三年又言四月戊午魏君為王韓亦為王據此魏稱王既在惠王四年不應又在十三年韓是年亦未嘗稱王則秦世家與表俱有誤也還以周本紀齊楚世家謂是年秦初稱王爲是魏韓趙始列為諸侯宜入周表不應獨書楚表疑誤晉世家云出公十七年智伯與魏韓趙共分范中行地以為邑出公怒表載㐮子四年與趙世家同按㐮子四年乃晉哀公三年既非出公時表又但書與智伯分范中行地不及韓魏疑有誤趙表載衛荘公飲大夫云云按左傳魯哀公二十五年衛侯為靈臺于藉圃與諸大夫飲褚師韈而登席公怒因攻公公奔宋是出公事諸本皆作莊公誤且當附入魏表入趙表亦誤越世家云楚威王大敗越殺王無疆盡取故吴地北破齊于徐州而越以此散楚表但載圍齊于徐州不書㓕越疑闕周赧王五十九年西周君奔秦盡獻其邑秦受獻歸其君于周周君王赧卒索隠正義皆謂西周君即西周武公也通鑑綱目則書王入秦盡獻其地歸而卒是西周君即周赧王非西周武公按周自敬王遷都成周號東周至考王封弟揭於河南都王城是為河南桓公實西周之始時則東有王西有公而東西之名未立至桓公孫惠公别封其少子班于鞏以奉王號東周惠公没亦諡惠是則有東西二周公二公雖各有食邑而周尚為一顯王二年趙成侯與韓攻周分周以為兩事載趙世家周本紀云王赧時東西周分治王赧徙都西周則為西周王或以其微弱亦稱西周君而索隱釋本紀周君王赧卒云周君指武公此時與王赧皆卒故連言之于文義未安秦昭王五十二年表書取西周王明指赧王荘㐮元年表書取東西周明指二周公又周本紀云王赧卒周民東亡秦遷西周公于􅓆狐後七歲秦莊㐮王㓕東西周東西周皆入于秦秦本紀則云東周君與諸侯謀秦秦使呂不韋誅之盡入其國不絶其祀以陽人地賜周君是時西周公已遷􅓆狐見於周本紀故秦本紀畧之也且本紀載王赧徙都西周既云徙都必有國邑索隠寄居西周之說亦未當也衛世家昭公時三晉强衛如小侯屬之正義曰屬趙按趙世家懷君三十一年朝魏魏殺懷君更立其弟為元君元君十四年秦抜魏東地更徙衛野王并濮陽為東郡則衛屬魏不屬趙也故附魏表鄭附韓中山附趙魯蔡附楚宋附齊皆為所㓕故也魏表衛出公二十一年衛悼公立衛世家同索隠曰出公初立十二年亡在外四年復入九年是為二十一年按左傳魯哀公十八年衛石圃逐其君起輙復歸哀公二十五年衛諸大夫攻公公出奔衛人立悼公輒遂卒于越則輒之復立僅八年年表世家皆誤索隠以初立十二年復入九年附㑹之尤誤趙桓子元年索隠曰桓子嘉㐮子弟也元年卒明年國人共立襄子子獻侯晚按趙世家襄子見伯魯之不立也伯魯襄子兄故太子廢必欲傳位伯魯子代成君成君死乃取成君子浣立為太子襄子卒浣立是為獻侯襄子弟桓子逐獻侯自立一年卒國人復迎立獻侯則獻侯襄子兄之孫索隱以為襄子子誤矣晚一本作脫疑浣字之訛趙表武靈王二十五年惠后卒趙世家索隠註云謂前太子章之母惠文王之嫡母也按此惠后即吴娃惠文王之母故下文云吴娃死愛弛孝成二年惠文后卒乃惠文王之后孝成王之母所謂太后不肯以長安君為質者也索隠誤以惠文后為吴娃為惠文王之母因以惠后為惠文王之嫡母乃以下書吴娃死為誤不亦䟱乎燕表君噲及相子之皆死徐廣註世家曰年表云君噲及太子相子之皆死索隐云年表誤按今本俱無太子字將徐廣索隱所見之本不同耶書傳既久殘闕舛誤大率可見故信以傳信疑以存疑不得妄為之說也
