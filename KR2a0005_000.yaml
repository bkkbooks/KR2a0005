body:
  text: 讀史記十表正史類提要臣等謹案讀史記十表十卷國朝汪越撰徐克范補越字師退康熙乙酉舉人克范字堯民皆南陽人是書有後記一篇記越初作此書成以書抵克范曰有讀史記十表一帙遍求友人商榷殊無一人按定子長原表通首訖尾印證鄙說之是非者不解何故仰惟細加推勘示明紕繆以便改訂有補義則亦書於篇將來授梓云云蓋古來增減前人舊本多在其人之身後惟此書則同時商𣙜而補之故考校頗為精密於讀史者尚屬有禆考史家之難在於表志而表文經緯相牽或連或斷可以考證而不可以誦讀學者往往不觀劉知幾考正史例至為詳悉而史通已有廢表之論則其他可知越等獨排比舊文鉤稽微義雖其間一筆一削務以春秋書法求之未免或失之鑿而訂訛砭漏所得為多其存疑諸條亦頗足正史記之抵牾異乎矉捧一書纎毫必為回護者於史學之中可謂人略我詳矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書讀史記十表總論太史公自序曰孔子作春秋學者至今則之自獲麟以來四百餘嵗而諸侯相兼史記放絶漢興百年之間天下遺文古事靡不畢集太史公衛宏漢儀注太史公武帝置天下計書先上太史公副上丞相瓚曰百官表無太史公司馬貞曰公者遷所著書尊其父云云也按遷序中亦自稱太史公非但尊其父也太史公仍父子相續纂其職談卒三年遷為太史令五年而當太初元年七年而太史公遭李陵之禍綱羅天下放失舊聞王迹所興原始察終見盛覩衰論考之行事略推三代録秦漢上記軒轅下至于茲著十二本紀既科條之矣並時異世年差不明作十表顔師古云並時異世則年厯差殊難以明辦故作表也正義云起黃帝迄天漢四年合二千四百一十三年維三代尚矣年紀不可考蓋取之譜諜舊聞本于茲于是略推作三代世表第一幽厲之後周室衰微諸侯專政春秋有所不紀而譜諜經略五霸更盛衰欲覩周世相先後之意作十二諸侯年表第二春秋之後陪臣秉政彊國相王以至于秦卒并諸夏滅封地擅其號作六國年表第三秦既暴虐楚人發難項氏遂亂漢乃扶義征伐八年之間天下三擅事繁變衆故詳著秦楚之際月表第四漢興以來至于太初百年諸侯廢立分削譜紀不明有司靡踵彊弱之原云以世正義曰譜紀不明故有司無所踵繼其後彊弱之原乃云以世相代都不能有所録記也按云字疑亡字之訛見亡以論其世也作漢興以來諸侯年表第五維高祖元功輔臣股肱剖符而爵澤流苗裔忘其昭穆或殺身隕國作高祖功臣侯者年表第六惠景之間維申功臣宗屬爵邑作惠景間侯者年表第七北討彊胡南誅徑越征伐夷蠻武功爰列作建元以來侯者年表第八諸侯既彊七國為從子弟衆多無爵封邑推恩行義其勢銷弱歸德京師作王子侯者年表第九國有賢相良將民之師表也維見漢興以來將相名臣年表賢者記其治不賢者彰其事作漢興以來將相名臣年表第十按太史公自序在史記篇末其歷序所以著本紀世家書表傳之意是一片文字不可割截茲所剟取特以其辭簡明使讀者觀其持論大㫖耳至每表之前各自有序惟將相名臣闕此固具載全表也司馬貞曰應劭云表者録其事而見之按禮有表記鄭𤣥云表明也謂事微而不著者須表以明之故曰表也張守節曰表分代系年封又云作表十象天之剛柔十日也鄭樵曰史記一書分為五體本紀紀年世家傳代表以正厯書以類事傳以著人林駉曰嘗觀遷史之表矣三代世表所以觀百世之本支也考黃帝之初先列諸系以祖宗為經以子孫為緯則五帝三王皆出于黃帝此帝王授受之正統可見也六國年表所以示天下之名分故齊康公之十九年為田和遷居海上而書曰齊太公卒田和亦稱太公且繫之康公二十年康公既卒始書田齊此尊卑逆順之正理可見矣十二諸侯年表以下以地為主故年經而國緯所以觀天下之大勢也功臣年表以下以時為主故國經而年緯所以觀一時之得失也秦楚月表上尊義帝而漢居其中明大義也將相年表上繫大事記明職分也凡表縱者為經衡者為緯王應麟曰班固謂司馬遷史記十篇有録無書顔師古以為十篇具在或草具而未成也漢興以來將相年表其書具在但闕前序按自序云凡百三十篇五十二萬六千五百字則當日全書已成或後散失故闕十篇耳按表者紀月編年聚而為繪圖指掌經緯縱橫有倫有脊其書法謹嚴幾于春秋大義數十炳若日星矣至所不言尤寓褒譏未易測識後人欲穿鑿立論復所未安誠㑹本紀世家列傳窮厥事理當自得之也
