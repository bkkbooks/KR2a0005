body:
  text: 讀史記十表卷四南陽汪越撰秦楚之際月表第四太史公讀秦楚之際曰初作難發于陳涉虐戾㓕秦自項氏撥亂誅暴平定海内卒踐帝阼成于漢家五年之間號令三嬗按五年指漢王始封及為帝凡五年自序云八年則統二世三年言之自生民以來未始有受命若斯之亟也昔虞夏之興積善累功數十年德洽百姓攝行政事考之於天然後在位湯武之王乃由契后稷修仁行義十餘世不期而㑹孟津八百諸侯猶以為未可其後乃放弑秦起襄公章于文繆獻孝之後稍以蠶食六國百有餘載至始皇乃能并冠帶之倫以徳若彼用力如此蓋一統若斯之難也秦既稱帝患兵革不休以有諸侯也于是無尺土之封墮壞名城銷鋒鏑鉏豪傑維萬世之安然王跡之興起于閭巷合從討伐軼于三代鄉秦之禁適足以資賢者為驅除難耳故憤發其所為天下雄安在無土不王白虎通曰聖人無土不王使舜不遭堯當如夫子老于闕里也此乃傳之所謂大聖乎豈非天哉豈非天哉非大聖孰能當此受命而帝者乎起秦二世元年楚隠王陳涉至西楚項羽亡為秦楚之際凡五年讀史記十表卷四讀秦楚之際月表讀秦楚之際月表以漢為主六國表末已書天下屬漢明正統也索隱云張晏曰時天下未定參錯變易不可以年紀故别其月按秦楚之際擾攘僭簒運數又促故以月記事而名表也冠秦於上非尊秦也天下共苦秦欲亡之而漢受命猶後必起秦而次及義帝至義帝為項羽所殺闕不書帝號凡四十有一月者天下未一也至漢五年殺項籍天下平諸侯臣屬漢二月王更號即皇帝位然後大統有歸太史公全注意在漢漢書異姓諸侯王表序亦云據漢受命譜十八王月而列之天下一統迺以年數沛公入咸陽即表曰漢元年何也子嬰已降秦亡矣約法三章秦民大悦惟恐沛公不王是漢之受命有天下决諸此也周赧王卒東西周亡而太史公不遽子秦必待六王畢而後許秦代周漢之代秦進之何速蓋特筆也讀秦楚之際月表當續六國表觀其時勢秦亡形已成六國㓕而復起然齊三田韓成之外皆非六國後也特以六國為名耳項梁立懷王羽尊之為義帝欲以義帝為名也且漢亦豈終臣義帝者哉羽殺義帝自假漢以出師之名也初懷王封羽為次将屬宋義封沛公為武安侯将碭郡兵楚漢雌雄始凑于此而有先入闗者王之之約當是時諸侯受秦兵則相救各畧地以自廣志未嘗不在天下也鉅鹿之戰楚兵威震天下諸侯皆倚楚為勍然最先入能亡秦者沛公也沛公入闗子嬰降遂除秦苛法還軍灞上待諸侯項羽入闗誅子嬰阬秦降卒二十萬屠燒咸陽諸侯未嘗心服而主命分王帖然聽之者徒以挾義帝為名也太史公月表進漢元年于入秦之初夫入秦之月猶未有漢而表漢元年于此又二月項羽入秦又一月始尊懷王為義帝元年沛公始王漢中都南鄭然則先後將牴牾歟曰不然也天下不可一日無主故秦亡則進漢以明有統此太史公微意在筆墨蹊徑之外者顧史以紀實而是時主命分王者西楚也挾義帝以為名則即以其名奉之非諸侯之得已也夫空名何啻弁髦然不可以假借義無予西楚故寧子義帝予義帝猶曰空名若予西楚則何名乎且帝王舉動必以其正漢誠有天下何必汲汲自王乎故表漢于十八王之中者謂紀時事之實且以戒後之人以數州土而盜名字者諸侯起皆自王必皆各有元年而太史公但云秦楚之際月表以正朔為天子有天下所布今諸侯各自王行于其所割據之土地而已故不許其元而以月表其義例嚴矣惟秦未亡之先則記二世元年義帝諸侯所共立則記義帝元年實則惟漢元年為此表之主也班固異姓諸侯王表冠漢元年下列諸國不書義帝尊漢也漢書一朝之體司馬遷作此表進漢元年于入秦之初而王漢中必書義帝元年以為非一代之書不得而不詳其實也嘗疑月表中諸侯亦有記年者何蓋其就國之年亦未嘗表元年也如西楚霸王二年一月同時有衡山王吴芮二年一月九江王英布二年一月闗中雍王章邯二年一月燕王臧荼二年一月一也西楚三年一月同時有衡山王三年一月燕王三年一月二也項羽誅韓成立鄭昌漢立韓王信信從漢伐楚故韓王信有二年一月三年一月三也西楚四年一月同時有衡山四年一月燕四年一月四也韓王信有四年一月五也漢立趙王張耳有二年一月六也項籍誅後燕有五年一月七也九江王英布身降漢地屬項籍漢立為淮南王籍誅後淮南有二年一月八也漢徙韓王信為代王有五年一月九也自義帝元年十八王就封以來各自紀其年耳意亦别有據依太史公間存之而未削歟然諸國之年參錯不齊因其就國之先後非天下一統之正朔故不得而盡同也秦以建亥為歳首凡言一月端月正月者皆十月也漢至武帝太初元年始用夏正表言秦楚之際不言秦漢之際者秦無道天下共亡之漢固㓕秦不得獨言秦漢之際也西楚雖主命分王諸侯與漢争天下而漢踣之然漢得天下于秦及趙齊燕韓魏非第得之于楚也且楚與項固非一也陳涉初起王楚葛嬰立襄疆亦王楚秦嘉立景駒亦王楚至項梁求懷王孫于民間亦立以為懷王王楚其後楚漢相争惟滎陽成皋垓下諸大戰乃獨項氏耳故亦不得獨言楚漢之際也二世元年同起兵者楚其一也次項次趙次齊次乃漢次燕次魏次韓凡八國而十三其姓表首列于下冠以秦年而諸侯不年者無統也積之至秦亡有八月者十六月者十八月者二十月者二十五月者二十九月者各㕘錯不齊也義帝元帝同就封者凡十有八楚分為四西楚其一也次衡山臨江九江也趙更名常山分為代是二也齊分為三臨淄濟北膠東也闗中分為四漢其一也餘則雍塞翟也燕分為遼東是二也西魏分為殷韓分為河南亦皆二也表列其始封姓名而曰故某王故某将故某官又曰都某地至漢誅籍即皇帝位于定陶諸侯畧盡其月亦各㕘錯不齊也今合為一表歴歴指掌分明此特創于子長為後來史家法茅坤曰讀秦楚月表海内土崩鼎沸之始末甚矣其可累欷太息也而彼真人者翺翔其間一切撥亂世反之正若轉圜然豈非神武而聖者乎按此語極得太史公尊漢之㫖索隱云趙歇前為趙已二十六月今徙王代之二月故云二十九月其膠東市之前為齊王十九月韓廣魏豹韓成三人並先為王已經多月故因舊月而載按此知月表但以月為主不編年也韓廣三十一月魏豹十九月韓成二十二月通前積月計之餘皆以受封就國之第二月起不數舊月也凡表諸國前從楚入秦後從漢伐楚蓋諸侯向背之機漢取天下善因而用之此髙祖五年以前天下之大勢也讀秦楚之際月表補從來紀年必以正朔如秦以十月為正朔每起十月訖九月以成一歲楚懷王之立在二世二年六月乃不依秦月而以一月起數週十二月復起懷王二年九月立為義帝其一歲之月未週即紀元年起月是不復有正朔矣故諸國俱以始事之月起數其十八王雖同時封而趙歇田市韓廣魏豹韓成及漢王仍累前月不同義帝即其同者義帝既㓕之後猶各紀年月蓋以非正朔故不共遵故謂之月表惟漢適當秦之十月至霸上子嬰降始稱元年遂依秦厯十月為嵗首以九月為尾以後九月為閏至五年成帝于是正朔乃一旣以子嬰降書漢元年又大書義帝元年于秦後者義帝固楚漢諸侯所共立受命者書漢元年者明漢興所由始書義帝元年者明漢猶未成乎帝也漢至五年即帝位不更起元固以初破秦為元年表亦錄其實耳非故進之也秦表端月或云即秦正十月非也秦以建亥為歳首仍稱十月未嘗以十月為正月也故表紀年從十月起歴十一月十二月乃有端月則端月為正月非十月也又按陳渉世家臘月陳王之汝陰其御莊賈殺以降秦張晏曰秦之臘月夏之九月瓉曰建丑之月也索隱曰按月表二世十月誅葛嬰十一月周文死十二月陳渉死瓉說為是據張晏所云則易月據瓉索隠則不易月胡氏隱元年春王正月傳有不易月不易時之說蔡氏商元祀十有二月傳云三代雖正朔不同然皆以寅月起數歴舉詩四月維夏六月徂暑及秦十二月更名臘曰嘉平為証朱子註孟子七八月云夏之五六月綱目紀秦皇及漢太初以前事又皆從冬十月起故先儒或云改時改月或云改月不改時或云時月俱不改紛紛未有定論愚按商書云爰革夏正夫夏正寅也商革之則商正月建丑可知若元祀十有二月孔氏云湯崩踰月太甲即位爲建子之月商禮制未備不得據周禮踰年改元例之孔氏之言未可為非詩所云四月維夏六月徂暑則漢書律厯志所謂言厯者仍以夏月是也故左傳卜偃言虢㓕在九月十月之交晉㓕虢在冬十二月丙子周十二月固夏之十月又申須曰火出於夏為三月于商為四月于周為五月又魯僖公五年春王正月辛亥朔日南至漢書律厯志載魯諸公冬至俱春正月冬至在十一月此一定者繋之正月其為改月明矣至胡氏謂周建子非春夫子以夏時冠周月尤非朱子云正為建子稱春不順故欲改從建寅耳如胡氏說則周改月不改時夫子何不云行夏之月而云行夏之時耶是商周時月俱改無可疑者獨秦以建亥為歲首其書始建國曰元年冬十月夫十月建亥夏月也周十月建酉秦雖繼周不仍周月而用夏月但歲首不以建寅耳不得據秦以例商周漢初仍秦舊武帝太初元年夏五月造太初厯始以春正月建寅為歲首楚項一耳特分書之者楚始陳渉繼景駒繼懷王項故楚将既立懷王又不奉命故别項於楚義帝既亡乃稱項為楚也立義帝者項氏書諸侯尊懷王為義帝衆所奉不與項氏之得立也徙義帝于郴者項氏書徙都江南郴若帝自徙然者不與項氏之得徙也書項羽㓕義帝等簒弑也月表所載大都諸國戰争興㓕之事獨漢二年六月書立太子或以為首建國本知所先務非也是時漢敗彭城楚取漢王父母妻子置之軍中漢王使人求家室獨得孝惠立為太子太子固當立獨不念太公乎何亟亟于此書非予其能知本也譏㤀親也四年九月書太公呂后歸自楚危之也帝為天下而幾戮其親敝蹝之義謂何豈逆知項伯能解止之乎分羮之語今不忍入于耳也周苛入楚並書楚表漢表者予節也故以官繋之存疑史公記事必簡而明不應作歇後語如周苛之入楚也因楚下滎陽生得周苛項王以上將啖之苛罵項王不屈王怒烹之入楚下疑闕烹之字漢四年四月書王出滎陽豹死未審豹為何人若曰魏豹三年八月已書周苛樅公殺豹或以此誤耶
